<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 混合动态多 Agent 系统 - 可视化监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 400px;
            grid-template-rows: 70px 1fr 250px;
            gap: 12px;
            height: 100vh;
            padding: 16px;
        }
        
        /* 顶部栏 */
        .header {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(124,58,237,0.1));
            border: 2px solid rgba(139,92,246,0.4);
            border-radius: 12px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .header h1 {
            font-size: 22px;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-stats {
            display: flex;
            gap: 20px;
        }
        
        .stat-item {
            text-align: center;
            padding: 8px 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            border: 1px solid rgba(139,92,246,0.3);
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #fbbf24;
        }
        
        .stat-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        
        /* 主画布区域 */
        .canvas-container {
            grid-row: 2 / 3;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(139,92,246,0.3);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        
        #office-canvas {
            width: 100%;
            height: 100%;
        }
        
        /* 右侧面板 */
        .side-panel {
            grid-row: 2 / 4;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .panel-card {
            background: rgba(26,26,46,0.8);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 12px;
            padding: 16px;
            backdrop-filter: blur(10px);
        }
        
        .panel-title {
            font-size: 13px;
            color: #a78bfa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .panel-title::before {
            content: '▸';
            color: #fbbf24;
        }
        
        /* 活动流 */
        .activity-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .activity-item {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            border-left: 3px solid #10b981;
        }
        
        .activity-item.task_complete { border-left-color: #10b981; }
        .activity-item.task_started { border-left-color: #3b82f6; }
        .activity-item.review { border-left-color: #8b5cf6; }
        .activity-item.error { border-left-color: #ef4444; }
        .activity-item.skill_solidified { border-left-color: #fbbf24; }
        
        .activity-time {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 4px;
        }
        
        .activity-content {
            font-size: 12px;
            line-height: 1.5;
        }
        
        .activity-agent {
            font-size: 11px;
            color: #a78bfa;
            margin-top: 4px;
        }
        
        /* 底部面板 */
        .bottom-panel {
            grid-column: 1 / 2;
            grid-row: 3 / 4;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
        }
        
        ::-webkit-scrollbar-thumb {
            background: #7c3aed;
            border-radius: 3px;
        }
        
        /* 加载动画 */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(139,92,246,0.2);
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #a78bfa;
            font-size: 14px;
        }
        
        /* 状态指示器 */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            font-size: 12px;
            margin-right: 10px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- 顶部栏 -->
        <div class="header">
            <div>
                <h1>🎯 混合动态多 Agent 系统 - 可视化监控</h1>
                <div style="margin-top: 8px;">
                    <span class="status-indicator">
                        <span class="status-dot"></span>
                        实时监控中
                    </span>
                    <span style="color: rgba(255,255,255,0.6); font-size: 12px;">
                        最后更新：<span id="last-update">--:--:--</span>
                    </span>
                </div>
            </div>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="stat-agents">0</div>
                    <div class="stat-label">子 Agent</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-tasks">0</div>
                    <div class="stat-label">任务</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="stat-solidifications">0</div>
                    <div class="stat-label">Skill 固化</div>
                </div>
            </div>
        </div>
        
        <!-- 主画布 -->
        <div class="canvas-container">
            <canvas id="office-canvas"></canvas>
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">正在加载监控系统...</div>
            </div>
        </div>
        
        <!-- 右侧面板 -->
        <div class="side-panel">
            <!-- 活动流 -->
            <div class="panel-card" style="flex: 1;">
                <div class="panel-title">📋 实时活动流</div>
                <div class="activity-list" id="activity-list">
                    <div style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">
                        暂无活动
                    </div>
                </div>
            </div>
            
            <!-- 系统统计 -->
            <div class="panel-card">
                <div class="panel-title">📊 系统统计</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div>
                        <div style="font-size: 11px; color: rgba(255,255,255,0.6);">总任务</div>
                        <div style="font-size: 18px; color: #fbbf24;" id="stat-total-tasks">0</div>
                    </div>
                    <div>
                        <div style="font-size: 11px; color: rgba(255,255,255,0.6);">完成率</div>
                        <div style="font-size: 18px; color: #10b981;" id="stat-completion-rate">0%</div>
                    </div>
                    <div>
                        <div style="font-size: 11px; color: rgba(255,255,255,0.6);">平均分数</div>
                        <div style="font-size: 18px; color: #3b82f6;" id="stat-average-score">0</div>
                    </div>
                    <div>
                        <div style="font-size: 11px; color: rgba(255,255,255,0.6);">Token 消耗</div>
                        <div style="font-size: 18px; color: #8b5cf6;" id="stat-token-usage">0</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部面板 -->
        <div class="bottom-panel">
            <div class="panel-card">
                <div class="panel-title">🏠 房间分布</div>
                <div id="room-distribution" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="panel-card">
                <div class="panel-title">💰 Token 使用</div>
                <div id="token-usage" style="text-align: center; padding: 20px;">
                    <div style="font-size: 24px; color: #fbbf24;" id="total-token">0</div>
                    <div style="font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 8px;">总消耗 / 总预算</div>
                </div>
            </div>
            <div class="panel-card">
                <div class="panel-title">🏆 Skill 固化</div>
                <div id="skill-stats" style="text-align: center; padding: 20px;">
                    <div style="font-size: 24px; color: #fbbf24;" id="solidification-count">0</div>
                    <div style="font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 8px;">固化次数</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 配置
        const CONFIG = {
            syncInterval: 3000,
            openclawHome: 'C:\\Users\\DELL\\.openclaw',
            skillHome: 'C:\\Users\\DELL\\.openclaw\\workspace\\skills\\dynamic-multi-agent-system',
        };
        
        // 模拟数据（实际会从文件系统读取）
        let mockData = {
            agents: [],
            activities: [],
            stats: {
                totalTasks: 0,
                completedTasks: 0,
                solidifications: 0,
                averageScore: 0,
                totalTokenUsage: 0,
            },
        };
        
        // 初始化画布
        const canvas = document.getElementById('office-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // 绘制办公室
        function drawOffice() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制房间背景
            drawRoomBackground();
            
            // 绘制 Agent
            mockData.agents.forEach(agent => {
                drawAgent(agent);
            });
        }
        
        function drawRoomBackground() {
            // 绘制办公室区域
            ctx.fillStyle = 'rgba(139,92,246,0.1)';
            ctx.fillRect(50, 50, canvas.width - 100, canvas.height - 100);
            
            // 绘制网格
            ctx.strokeStyle = 'rgba(139,92,246,0.2)';
            ctx.lineWidth = 1;
            
            for (let x = 50; x < canvas.width; x += 100) {
                ctx.beginPath();
                ctx.moveTo(x, 50);
                ctx.lineTo(x, canvas.height - 50);
                ctx.stroke();
            }
            
            for (let y = 50; y < canvas.height; y += 80) {
                ctx.beginPath();
                ctx.moveTo(50, y);
                ctx.lineTo(canvas.width - 50, y);
                ctx.stroke();
            }
        }
        
        function drawAgent(agent) {
            const x = agent.x || (Math.random() * (canvas.width - 100) + 50);
            const y = agent.y || (Math.random() * (canvas.height - 100) + 50);
            
            // 绘制 Agent 身体
            ctx.fillStyle = agent.color || '#8b5cf6';
            ctx.beginPath();
            ctx.arc(x, y, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // 绘制 emoji
            ctx.font = '24px Arial';
            ctx.fillText(agent.emoji || '🤖', x - 12, y + 8);
            
            // 绘制名称
            ctx.fillStyle = '#fff';
            ctx.font = '11px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(agent.name || 'Agent', x, y + 35);
            
            // 绘制进度条
            const progress = agent.progress || 0;
            drawProgressBar(ctx, progress, x - 20, y + 45, 40, 4);
            
            // 绘制 Token 消耗
            const usagePercent = ((agent.tokenUsage || 0) / (agent.tokenBudget || 50000)) * 100;
            ctx.fillStyle = usagePercent > 90 ? '#ef4444' : usagePercent > 70 ? '#f59e0b' : '#10b981';
            ctx.font = '9px monospace';
            ctx.fillText(`${Math.round(usagePercent)}%`, x, y + 60);
        }
        
        function drawProgressBar(ctx, progress, x, y, width, height) {
            // 背景
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(x, y, width, height);
            
            // 进度
            ctx.fillStyle = '#10b981';
            ctx.fillRect(x, y, width * progress, height);
            
            // 边框
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, width, height);
        }
        
        // 更新活动流
        function updateActivityList() {
            const list = document.getElementById('activity-list');
            
            if (mockData.activities.length === 0) {
                list.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5); padding: 20px;">暂无活动</div>';
                return;
            }
            
            list.innerHTML = mockData.activities.slice(-10).reverse().map(activity => `
                <div class="activity-item ${activity.type || 'regular'}">
                    <div class="activity-time">${new Date(activity.timestamp).toLocaleTimeString()}</div>
                    <div class="activity-content">${activity.content || '活动'}</div>
                    <div class="activity-agent">${activity.agentName || 'Agent'}</div>
                </div>
            `).join('');
        }
        
        // 更新统计
        function updateStats() {
            document.getElementById('stat-agents').textContent = mockData.agents.length;
            document.getElementById('stat-tasks').textContent = mockData.stats.totalTasks || 0;
            document.getElementById('stat-solidifications').textContent = mockData.stats.solidifications || 0;
            document.getElementById('stat-total-tasks').textContent = mockData.stats.totalTasks || 0;
            document.getElementById('stat-completion-rate').textContent = 
                `${Math.round(((mockData.stats.completedTasks || 0) / (mockData.stats.totalTasks || 1)) * 100)}%`;
            document.getElementById('stat-average-score').textContent = mockData.stats.averageScore || 0;
            document.getElementById('stat-token-usage').textContent = 
                (mockData.stats.totalTokenUsage || 0).toLocaleString();
            document.getElementById('total-token').textContent = 
                (mockData.stats.totalTokenUsage || 0).toLocaleString();
            document.getElementById('solidification-count').textContent = 
                mockData.stats.solidifications || 0;
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
        }
        
        // 模拟数据生成
        function generateMockData() {
            const roles = [
                { emoji: '🏰', name: '世界观架构师', color: '#8b5cf6' },
                { emoji: '📐', name: '大纲设计师', color: '#7c3aed' },
                { emoji: '🎭', name: '角色塑造师', color: '#6366f1' },
                { emoji: '🕸️', name: '剧情编织师', color: '#3b82f6' },
                { emoji: '⚗️', name: '文字炼金师', color: '#10b981' },
                { emoji: '🔍', name: '审查官', color: '#f59e0b' },
            ];
            
            mockData.agents = roles.map((role, index) => ({
                id: `agent-${index + 1}`,
                name: `${role.name}-${index + 1}`,
                emoji: role.emoji,
                color: role.color,
                progress: Math.random(),
                tokenUsage: Math.random() * 30000,
                tokenBudget: 50000,
                x: 100 + (index % 3) * 200,
                y: 100 + Math.floor(index / 3) * 150,
            }));
            
            mockData.activities = [
                { timestamp: new Date().toISOString(), type: 'task_started', content: '开始执行子任务 1', agentName: '世界观架构师 -1' },
                { timestamp: new Date(Date.now() - 60000).toISOString(), type: 'task_progress', content: '进度更新 65%', agentName: '大纲设计师 -1' },
                { timestamp: new Date(Date.now() - 120000).toISOString(), type: 'task_complete', content: '子任务完成', agentName: '角色塑造师 -1' },
            ];
            
            mockData.stats = {
                totalTasks: 12,
                completedTasks: 8,
                solidifications: 3,
                averageScore: 92,
                totalTokenUsage: 1250000,
            };
        }
        
        // 主循环
        function mainLoop() {
            generateMockData();
            drawOffice();
            updateActivityList();
            updateStats();
            
            // 隐藏加载动画
            document.getElementById('loading').style.display = 'none';
        }
        
        // 启动
        mainLoop();
        setInterval(mainLoop, CONFIG.syncInterval);
    </script>
</body>
</html>
