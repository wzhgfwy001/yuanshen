<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多 Agent 队列实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .card-icon {
            font-size: 32px;
            margin-right: 15px;
        }
        
        .card-title {
            font-size: 16px;
            color: #64748b;
            font-weight: 500;
        }
        
        .metric {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .metric.pending { color: #ea580c; }
        .metric.running { color: #16a34a; }
        .metric.completed { color: #2563eb; }
        .metric.warning { color: #dc2626; }
        
        .card-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: #64748b;
        }
        
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s;
        }
        
        .details-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .details-section h2 {
            margin-bottom: 20px;
            color: #1e293b;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: #f8fafc;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #64748b;
        }
        
        tr:hover {
            background: #f8fafc;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-badge.pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-badge.running {
            background: #dcfce7;
            color: #166534;
        }
        
        .status-badge.completed {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .refresh-info {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 13px;
        }
        
        .alert-box {
            background: #fef2f2;
            border: 2px solid #fecaca;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .alert-box h3 {
            color: #dc2626;
            margin-bottom: 10px;
        }
        
        .alert-box ul {
            list-style: none;
            color: #991b1b;
        }
        
        .alert-box li {
            padding: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 多 Agent 队列实时监控</h1>
            <p>Multi-Agent Queue Real-time Monitor</p>
        </header>
        
        <!-- 告警区域 -->
        <div id="alert-container"></div>
        
        <!-- 仪表盘 -->
        <div class="dashboard">
            <!-- 待处理任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">⏳</span>
                    <span class="card-title">待处理队列</span>
                </div>
                <div class="metric pending" id="pending-count">0</div>
                <div class="card-footer">
                    等待执行的任务
                    <div class="progress-bar">
                        <div class="progress-fill" id="pending-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <!-- 运行中任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">▶️</span>
                    <span class="card-title">运行中任务</span>
                </div>
                <div class="metric running" id="running-count">0</div>
                <div class="card-footer">
                    活跃子 Agent: <span id="active-subagents">0</span> / 12
                    <div class="progress-bar">
                        <div class="progress-fill" id="subagent-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <!-- 已完成任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">✅</span>
                    <span class="card-title">今日完成</span>
                </div>
                <div class="metric completed" id="completed-count">0</div>
                <div class="card-footer">
                    总完成：<span id="total-completed">0</span>
                </div>
            </div>
            
            <!-- 可用资源 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🎯</span>
                    <span class="card-title">可用任务槽位</span>
                </div>
                <div class="metric" id="task-slots" style="color: #2563eb">3</div>
                <div class="card-footer">
                    最大并发：3 个任务
                </div>
            </div>
            
            <!-- 子 Agent 使用率 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🤖</span>
                    <span class="card-title">子 Agent 使用率</span>
                </div>
                <div class="metric" id="subagent-usage" style="color: #16a34a">0%</div>
                <div class="card-footer">
                    可用：<span id="available-subagents">12</span> / 12
                </div>
            </div>
            
            <!-- 系统状态 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">💚</span>
                    <span class="card-title">系统状态</span>
                </div>
                <div class="metric" id="system-status" style="color: #16a34a; font-size: 24px;">正常</div>
                <div class="card-footer">
                    最后更新：<span id="last-update">--:--:--</span>
                </div>
            </div>
        </div>
        
        <!-- 任务详情 -->
        <div class="details-section">
            <h2>📋 运行中任务详情</h2>
            <table>
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>任务名称</th>
                        <th>状态</th>
                        <th>子 Agent</th>
                        <th>进度</th>
                        <th>耗时</th>
                    </tr>
                </thead>
                <tbody id="task-table-body">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #94a3b8;">暂无运行中任务</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="refresh-info">
            🔄 数据每 5 秒自动刷新 | 下次刷新：<span id="next-refresh">5</span>秒
        </div>
    </div>
    
    <script>
        // API 地址（实际使用时替换为真实地址）
        const API_BASE = 'http://localhost:5000/api';
        
        // 倒计时
        let countdown = 5;
        
        // 更新仪表盘
        async function updateDashboard() {
            try {
                // 获取队列状态
                const response = await fetch(`${API_BASE}/queue/status`);
                const data = await response.json();
                
                // 更新指标
                document.getElementById('pending-count').textContent = data.pending.count;
                document.getElementById('running-count').textContent = data.running.count;
                document.getElementById('completed-count').textContent = data.completed.today;
                document.getElementById('total-completed').textContent = data.completed.count;
                document.getElementById('task-slots').textContent = data.resources.available_task_slots;
                document.getElementById('active-subagents').textContent = data.running.active_subagents;
                document.getElementById('available-subagents').textContent = data.resources.available_subagents;
                
                // 更新使用率
                const usage = (data.resources.usage_rate * 100).toFixed(1);
                document.getElementById('subagent-usage').textContent = usage + '%';
                
                // 更新进度条
                document.getElementById('pending-bar').style.width = Math.min(data.pending.count / 10 * 100, 100) + '%';
                document.getElementById('subagent-bar').style.width = usage + '%';
                
                // 更新系统状态
                const statusEl = document.getElementById('system-status');
                if (data.resources.usage_rate > 0.9) {
                    statusEl.textContent = '高负载';
                    statusEl.style.color = '#dc2626';
                } else if (data.resources.usage_rate > 0.7) {
                    statusEl.textContent = '繁忙';
                    statusEl.style.color = '#ea580c';
                } else {
                    statusEl.textContent = '正常';
                    statusEl.style.color = '#16a34a';
                }
                
                // 更新时间
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                
                // 检查告警
                checkAlerts(data);
                
                // 更新任务详情表
                updateTaskTable(data.running.tasks);
                
            } catch (error) {
                console.error('获取数据失败:', error);
                // 使用模拟数据演示
                // updateWithMockData();
            }
            
            // 重置倒计时
            countdown = 5;
        }
        
        // 检查告警
        function checkAlerts(data) {
            const alertContainer = document.getElementById('alert-container');
            
            if (data.resources.usage_rate > 0.9 || data.pending.count > 10) {
                alertContainer.innerHTML = `
                    <div class="alert-box">
                        <h3>⚠️ 系统告警</h3>
                        <ul>
                            ${data.resources.usage_rate > 0.9 ? '<li>子 Agent 使用率超过 90%</li>' : ''}
                            ${data.pending.count > 10 ? `<li>待处理任务过多：${data.pending.count}个</li>` : ''}
                        </ul>
                    </div>
                `;
            } else {
                alertContainer.innerHTML = '';
            }
        }
        
        // 更新任务详情表
        function updateTaskTable(tasks) {
            const tbody = document.getElementById('task-table-body');
            
            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #94a3b8;">暂无运行中任务</td></tr>';
                return;
            }
            
            tbody.innerHTML = tasks.map(task => `
                <tr>
                    <td>${task.id}</td>
                    <td>${task.name}</td>
                    <td><span class="status-badge ${task.status}">${task.status}</span></td>
                    <td>${task.active_subagents}个</td>
                    <td>${(task.progress * 100).toFixed(1)}%</td>
                    <td>${task.started_at ? formatDuration(Date.now()/1000 - new Date(task.started_at).getTime()/1000) : '-'}</td>
                </tr>
            `).join('');
        }
        
        // 格式化时长
        function formatDuration(seconds) {
            if (seconds < 60) return `${Math.floor(seconds)}秒`;
            if (seconds < 3600) return `${Math.floor(seconds/60)}分`;
            return `${Math.floor(seconds/3600)}小时${Math.floor((seconds%3600)/60)}分`;
        }
        
        // 倒计时
        setInterval(() => {
            countdown--;
            document.getElementById('next-refresh').textContent = countdown;
            if (countdown <= 0) {
                updateDashboard();
            }
        }, 1000);
        
        // 初始加载
        updateDashboard();
    </script>
</body>
</html>
