<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔮 魔法塔队列监控 - Mage Tower Queue Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* 标题区域 - 魔法师主题 */
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1s ease;
        }
        
        header h1 {
            font-size: 42px;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233,69,96,0.5), 0 0 40px rgba(233,69,96,0.3);
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite;
        }
        
        header p {
            font-size: 16px;
            color: #a2a8d3;
            letter-spacing: 2px;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(233,69,96,0.5); }
            50% { text-shadow: 0 0 40px rgba(233,69,96,0.8), 0 0 60px rgba(233,69,96,0.4); }
        }
        
        /* 主 Agent 展示区 - 女魔法师 */
        .main-agent-section {
            background: linear-gradient(135deg, rgba(26,26,46,0.9), rgba(22,33,62,0.9));
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid #e94560;
            box-shadow: 0 0 30px rgba(233,69,96,0.3);
            animation: fadeInUp 1s ease;
            position: relative;
            overflow: hidden;
        }
        
        .main-agent-section::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(233,69,96,0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .main-agent-content {
            display: flex;
            align-items: center;
            gap: 30px;
            position: relative;
            z-index: 1;
        }
        
        .mage-avatar {
            width: 150px;
            height: 150px;
            flex-shrink: 0;
            position: relative;
        }
        
        /* 女魔法师形象 - SVG */
        .mage-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(233,69,96,0.5));
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .mage-info {
            flex: 1;
        }
        
        .mage-info h2 {
            color: #e94560;
            font-size: 28px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .mage-info h2::before {
            content: '👩‍🦰';
            font-size: 32px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .mage-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .stat-card {
            background: rgba(233,69,96,0.1);
            border: 1px solid rgba(233,69,96,0.3);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            background: rgba(233,69,96,0.2);
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233,69,96,0.4);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #e94560;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 13px;
            color: #a2a8d3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        /* 仪表盘区域 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .card {
            background: linear-gradient(135deg, rgba(26,26,46,0.9), rgba(22,33,62,0.9));
            border-radius: 20px;
            padding: 25px;
            border: 2px solid rgba(162,168,211,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s;
            animation: fadeInUp 0.6s ease backwards;
            position: relative;
            overflow: hidden;
        }
        
        .card:nth-child(1) { animation-delay: 0.1s; border-color: rgba(234,139,34,0.5); }
        .card:nth-child(2) { animation-delay: 0.2s; border-color: rgba(22,163,74,0.5); }
        .card:nth-child(3) { animation-delay: 0.3s; border-color: rgba(37,99,235,0.5); }
        .card:nth-child(4) { animation-delay: 0.4s; border-color: rgba(168,85,247,0.5); }
        .card:nth-child(5) { animation-delay: 0.5s; border-color: rgba(236,72,153,0.5); }
        .card:nth-child(6) { animation-delay: 0.6s; border-color: rgba(34,197,94,0.5); }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            from { left: -100%; }
            to { left: 100%; }
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }
        
        .card-icon {
            font-size: 36px;
            filter: drop-shadow(0 0 10px currentColor);
        }
        
        .card-title {
            font-size: 16px;
            color: #a2a8d3;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .metric {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .card-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(162,168,211,0.2);
            font-size: 13px;
            color: #a2a8d3;
        }
        
        /* 进度条魔法效果 */
        .progress-bar {
            width: 100%;
            height: 12px;
            background: rgba(162,168,211,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 10px;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e94560, #ff6b6b, #e94560);
            background-size: 200% 100%;
            border-radius: 6px;
            transition: width 0.5s ease;
            position: relative;
            animation: gradientFlow 2s linear infinite;
        }
        
        @keyframes gradientFlow {
            from { background-position: 0% 50%; }
            to { background-position: 200% 50%; }
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: progressShimmer 1.5s infinite;
        }
        
        @keyframes progressShimmer {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
        
        /* 子 Agent 展示区 */
        .subagents-section {
            background: linear-gradient(135deg, rgba(26,26,46,0.9), rgba(22,33,62,0.9));
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid rgba(168,85,247,0.3);
            box-shadow: 0 0 30px rgba(168,85,247,0.2);
            animation: fadeInUp 0.8s ease;
        }
        
        .subagents-section h2 {
            color: #a855f7;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .subagents-section h2::before {
            content: '🧙';
            font-size: 28px;
        }
        
        .subagent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .subagent-card {
            background: rgba(168,85,247,0.1);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .subagent-card:hover {
            background: rgba(168,85,247,0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(168,85,247,0.3);
        }
        
        .subagent-avatar {
            font-size: 48px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        
        .subagent-role {
            font-size: 14px;
            color: #e94560;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .subagent-status {
            font-size: 12px;
            color: #a2a8d3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* 任务详情表格 */
        .details-section {
            background: linear-gradient(135deg, rgba(26,26,46,0.9), rgba(22,33,62,0.9));
            border-radius: 20px;
            padding: 30px;
            border: 2px solid rgba(37,99,235,0.3);
            box-shadow: 0 0 30px rgba(37,99,235,0.2);
        }
        
        .details-section h2 {
            color: #2563eb;
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .details-section h2::before {
            content: '📜';
            font-size: 28px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: linear-gradient(90deg, rgba(37,99,235,0.3), rgba(168,85,247,0.3));
            color: #e94560;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(37,99,235,0.3);
        }
        
        td {
            padding: 15px;
            border: 1px solid rgba(162,168,211,0.1);
            color: #a2a8d3;
            font-size: 14px;
        }
        
        tr {
            animation: slideIn 0.5s ease backwards;
            transition: all 0.3s;
        }
        
        tr:hover {
            background: rgba(233,69,96,0.1);
            transform: scale(1.01);
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* 状态徽章 */
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .status-badge.pending {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #1a1a2e;
            box-shadow: 0 0 10px rgba(251,191,36,0.5);
        }
        
        .status-badge.running {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 0 10px rgba(34,197,94,0.5);
        }
        
        .status-badge.completed {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }
        
        /* 告警框 */
        .alert-box {
            background: linear-gradient(135deg, rgba(220,38,38,0.2), rgba(185,28,28,0.2));
            border: 2px solid rgba(220,38,38,0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            animation: fadeInDown 0.5s ease, alertPulse 2s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(220,38,38,0.3);
        }
        
        @keyframes alertPulse {
            0%, 100% { box-shadow: 0 0 30px rgba(220,38,38,0.3); }
            50% { box-shadow: 0 0 50px rgba(220,38,38,0.6); }
        }
        
        .alert-box h3 {
            color: #dc2626;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alert-box ul {
            list-style: none;
            color: #fca5a5;
        }
        
        .alert-box li {
            padding: 5px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .alert-box li::before {
            content: '⚠️';
            position: absolute;
            left: 0;
        }
        
        /* 刷新信息 */
        .refresh-info {
            text-align: center;
            color: #a2a8d3;
            margin-top: 30px;
            font-size: 14px;
            animation: fadeInUp 1s ease;
        }
        
        .refresh-countdown {
            display: inline-block;
            background: rgba(233,69,96,0.2);
            border: 1px solid rgba(233,69,96,0.5);
            border-radius: 20px;
            padding: 5px 15px;
            margin-left: 10px;
            color: #e94560;
            font-weight: 600;
        }
        
        /* 六翼天使装饰 */
        .seraph-decoration {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 64px;
            opacity: 0.3;
            animation: float 5s ease-in-out infinite, rotate 20s linear infinite;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.5));
            pointer-events: none;
            z-index: 0;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            header h1 { font-size: 28px; }
            .main-agent-content { flex-direction: column; text-align: center; }
            .mage-stats { grid-template-columns: 1fr; }
            .dashboard { grid-template-columns: 1fr; }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>
    
    <!-- 六翼天使装饰 -->
    <div class="seraph-decoration">👼</div>
    
    <div class="container">
        <header>
            <h1>🔮 魔法塔队列监控</h1>
            <p>Mage Tower Queue Monitor</p>
        </header>
        
        <!-- 告警区域 -->
        <div id="alert-container"></div>
        
        <!-- 主 Agent 展示 - 女魔法师 -->
        <div class="main-agent-section">
            <div class="main-agent-content">
                <div class="mage-avatar">
                    <!-- 女魔法师 SVG 形象 -->
                    <svg class="mage-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                        <!-- 魔法光环 -->
                        <circle cx="100" cy="100" r="90" fill="none" stroke="#e94560" stroke-width="2" opacity="0.3">
                            <animate attributeName="r" values="85;95;85" dur="3s" repeatCount="indefinite"/>
                        </circle>
                        
                        <!-- 黑色长袍 -->
                        <path d="M100 60 L70 180 L130 180 Z" fill="#1a1a2e"/>
                        <path d="M100 60 L60 140 L80 180" fill="#16213e"/>
                        <path d="M100 60 L140 140 L120 180" fill="#0f3460"/>
                        
                        <!-- 长发 -->
                        <ellipse cx="100" cy="70" rx="35" ry="40" fill="#2d1b4e"/>
                        <path d="M65 70 Q60 120 65 150" stroke="#2d1b4e" stroke-width="12" fill="none"/>
                        <path d="M135 70 Q140 120 135 150" stroke="#2d1b4e" stroke-width="12" fill="none"/>
                        
                        <!-- 脸 -->
                        <ellipse cx="100" cy="75" rx="25" ry="30" fill="#f5d0c5"/>
                        
                        <!-- 魔法帽 -->
                        <polygon points="100,10 70,60 130,60" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
                        <ellipse cx="100" cy="60" rx="40" ry="8" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
                        <circle cx="100" cy="30" r="5" fill="#e94560">
                            <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
                        </circle>
                        
                        <!-- 大圈眼镜 -->
                        <circle cx="90" cy="75" r="10" fill="none" stroke="#e94560" stroke-width="2"/>
                        <circle cx="110" cy="75" r="10" fill="none" stroke="#e94560" stroke-width="2"/>
                        <line x1="100" y1="75" x2="100" y2="75" stroke="#e94560" stroke-width="2"/>
                        
                        <!-- 眼睛 -->
                        <circle cx="90" cy="75" r="4" fill="#1a1a2e"/>
                        <circle cx="110" cy="75" r="4" fill="#1a1a2e"/>
                        <circle cx="92" cy="73" r="1.5" fill="white"/>
                        <circle cx="112" cy="73" r="1.5" fill="white"/>
                        
                        <!-- 微笑 -->
                        <path d="M95 85 Q100 90 105 85" stroke="#d48792" stroke-width="2" fill="none"/>
                        
                        <!-- 魔法星星 -->
                        <g fill="#e94560">
                            <polygon points="50,40 52,45 57,45 53,48 54,53 50,50 46,53 47,48 43,45 48,45">
                                <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
                            </polygon>
                            <polygon points="150,30 152,35 157,35 153,38 154,43 150,40 146,43 147,38 143,35 148,35">
                                <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
                            </polygon>
                            <polygon points="160,80 162,85 167,85 163,88 164,93 160,90 156,93 157,88 153,85 158,85">
                                <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
                            </polygon>
                        </g>
                    </svg>
                </div>
                
                <div class="mage-info">
                    <h2>主施法者 - 艾莉娅</h2>
                    <div class="mage-stats">
                        <div class="stat-card">
                            <div class="stat-value" id="mage-active-tasks">0</div>
                            <div class="stat-label">活跃任务</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="mage-subagents">0</div>
                            <div class="stat-label">召唤子灵</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="mage-success-rate">100%</div>
                            <div class="stat-label">施法成功率</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="mage-mana">100%</div>
                            <div class="stat-label">魔力储备</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 仪表盘 -->
        <div class="dashboard">
            <!-- 待处理任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">⏳</span>
                    <span class="card-title">待处理队列</span>
                </div>
                <div class="metric" id="pending-count" style="color: #fbbf24">0</div>
                <div class="card-footer">
                    等待施法的卷轴
                    <div class="progress-bar">
                        <div class="progress-fill" id="pending-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <!-- 运行中任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">✨</span>
                    <span class="card-title">施法中任务</span>
                </div>
                <div class="metric" id="running-count" style="color: #22c55e">0</div>
                <div class="card-footer">
                    活跃子灵：<span id="active-subagents">0</span> / 12
                    <div class="progress-bar">
                        <div class="progress-fill" id="subagent-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <!-- 已完成任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">✅</span>
                    <span class="card-title">今日完成</span>
                </div>
                <div class="metric" id="completed-count" style="color: #3b82f6">0</div>
                <div class="card-footer">
                    总完成：<span id="total-completed">0</span>
                </div>
            </div>
            
            <!-- 可用任务槽位 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🎯</span>
                    <span class="card-title">可用施法槽位</span>
                </div>
                <div class="metric" id="task-slots" style="color: #a855f7">3</div>
                <div class="card-footer">
                    最大并发：3 个法术
                </div>
            </div>
            
            <!-- 子 Agent 使用率 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🧙</span>
                    <span class="card-title">子灵使用率</span>
                </div>
                <div class="metric" id="subagent-usage" style="color: #ec4899">0%</div>
                <div class="card-footer">
                    可用：<span id="available-subagents">12</span> / 12
                </div>
            </div>
            
            <!-- 系统状态 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">💎</span>
                    <span class="card-title">魔法塔状态</span>
                </div>
                <div class="metric" id="system-status" style="color: #22c55e; font-size: 24px;">正常</div>
                <div class="card-footer">
                    最后更新：<span id="last-update">--:--:--</span>
                </div>
            </div>
        </div>
        
        <!-- 子 Agent 展示区 -->
        <div class="subagents-section">
            <h2>活跃子灵</h2>
            <div class="subagent-grid" id="subagent-grid">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 任务详情 -->
        <div class="details-section">
            <h2>📜 施法卷轴详情</h2>
            <table>
                <thead>
                    <tr>
                        <th>卷轴 ID</th>
                        <th>任务名称</th>
                        <th>状态</th>
                        <th>子灵</th>
                        <th>进度</th>
                        <th>耗时</th>
                    </tr>
                </thead>
                <tbody id="task-table-body">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #64748b;">暂无施法中的卷轴</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="refresh-info">
            🔄 魔力共鸣每 <span class="refresh-countdown" id="next-refresh">5</span> 秒刷新
        </div>
    </div>
    
    <script>
        // API 地址
        const API_BASE = 'http://localhost:5000/api';
        
        // 倒计时
        let countdown = 5;
        
        // 子 Agent 角色形象映射
        const SUBAGENT_AVATARS = {
            // 写作类
            '世界观架构师': '🏰',
            '大纲设计师': '📐',
            '角色塑造师': '🎭',
            '剧情编织者': '🕸️',
            '文字炼金师': '⚗️',
            '审查官': '🔍',
            
            // 分析类
            '数据分析师': '📊',
            '趋势预测师': '🔮',
            '策略顾问': '💡',
            '报告撰写师': '📝',
            
            // 创意类
            '创意总监': '🎨',
            '视觉设计师': '🖼️',
            '音效设计师': '🎵',
            '体验设计师': '🎮',
            
            // 技术类
            '架构师': '🏗️',
            '开发工程师': '💻',
            '测试工程师': '🧪',
            '运维工程师': '⚙️',
            
            // 默认
            'default': '🧙'
        };
        
        // 获取子 Agent 形象
        function getSubagentAvatar(role) {
            return SUBAGENT_AVATARS[role] || SUBAGENT_AVATARS['default'];
        }
        
        // 生成星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = (Math.random() * 3 + 1) + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        
        // 更新仪表盘
        async function updateDashboard() {
            try {
                const response = await fetch(`${API_BASE}/queue/status?mock=true`);
                const data = await response.json();
                
                // 更新指标
                document.getElementById('pending-count').textContent = data.pending.count;
                document.getElementById('running-count').textContent = data.running.count;
                document.getElementById('completed-count').textContent = data.completed.today;
                document.getElementById('total-completed').textContent = data.completed.count;
                document.getElementById('task-slots').textContent = data.resources.available_task_slots;
                document.getElementById('active-subagents').textContent = data.running.active_subagents;
                document.getElementById('available-subagents').textContent = data.resources.available_subagents;
                
                // 更新主 Agent 统计
                document.getElementById('mage-active-tasks').textContent = data.running.count;
                document.getElementById('mage-subagents').textContent = data.running.active_subagents;
                
                // 更新使用率
                const usage = (data.resources.usage_rate * 100).toFixed(1);
                document.getElementById('subagent-usage').textContent = usage + '%';
                
                // 更新进度条
                document.getElementById('pending-bar').style.width = Math.min(data.pending.count / 10 * 100, 100) + '%';
                document.getElementById('subagent-bar').style.width = usage + '%';
                
                // 更新系统状态
                const statusEl = document.getElementById('system-status');
                if (data.resources.usage_rate > 0.9) {
                    statusEl.textContent = '魔力过载';
                    statusEl.style.color = '#dc2626';
                } else if (data.resources.usage_rate > 0.7) {
                    statusEl.textContent = '高负荷';
                    statusEl.style.color = '#ea580c';
                } else {
                    statusEl.textContent = '正常';
                    statusEl.style.color = '#22c55e';
                }
                
                // 更新时间
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                
                // 检查告警
                checkAlerts(data);
                
                // 更新任务详情表
                updateTaskTable(data.running.tasks);
                
                // 更新子 Agent 展示
                updateSubagentGrid(data.running.tasks);
                
            } catch (error) {
                console.error('获取数据失败:', error);
                // 使用模拟数据演示
                updateWithMockData();
            }
            
            // 重置倒计时
            countdown = 5;
        }
        
        // 模拟数据演示
        function updateWithMockData() {
            const mockData = {
                pending: { count: 2, tasks: [] },
                running: {
                    count: 1,
                    tasks: [{
                        id: 'task-001',
                        name: '悬疑小说大纲设计',
                        status: 'running',
                        active_subagents: 4,
                        progress: 0.65,
                        started_at: new Date(Date.now() - 240000).toISOString()
                    }],
                    active_subagents: 4
                },
                completed: { count: 5, today: 3 },
                resources: {
                    available_task_slots: 2,
                    available_subagents: 8,
                    total_subagents: 12,
                    usage_rate: 0.33
                }
            };
            
            const data = mockData;
            document.getElementById('pending-count').textContent = data.pending.count;
            document.getElementById('running-count').textContent = data.running.count;
            document.getElementById('completed-count').textContent = data.completed.today;
            document.getElementById('total-completed').textContent = data.completed.count;
            document.getElementById('task-slots').textContent = data.resources.available_task_slots;
            document.getElementById('active-subagents').textContent = data.running.active_subagents;
            document.getElementById('available-subagents').textContent = data.resources.available_subagents;
            document.getElementById('mage-active-tasks').textContent = data.running.count;
            document.getElementById('mage-subagents').textContent = data.running.active_subagents;
            
            const usage = (data.resources.usage_rate * 100).toFixed(1);
            document.getElementById('subagent-usage').textContent = usage + '%';
            document.getElementById('pending-bar').style.width = Math.min(data.pending.count / 10 * 100, 100) + '%';
            document.getElementById('subagent-bar').style.width = usage + '%';
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            
            updateTaskTable(data.running.tasks);
            updateSubagentGrid(data.running.tasks);
        }
        
        // 检查告警
        function checkAlerts(data) {
            const alertContainer = document.getElementById('alert-container');
            
            if (data.resources.usage_rate > 0.9 || data.pending.count > 10) {
                alertContainer.innerHTML = `
                    <div class="alert-box">
                        <h3>⚠️ 魔力告急</h3>
                        <ul>
                            ${data.resources.usage_rate > 0.9 ? '<li>子灵使用率超过 90%</li>' : ''}
                            ${data.pending.count > 10 ? `<li>待处理卷轴过多：${data.pending.count}个</li>` : ''}
                        </ul>
                    </div>
                `;
            } else {
                alertContainer.innerHTML = '';
            }
        }
        
        // 更新任务详情表
        function updateTaskTable(tasks) {
            const tbody = document.getElementById('task-table-body');
            
            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #64748b;">暂无施法中的卷轴</td></tr>';
                return;
            }
            
            tbody.innerHTML = tasks.map((task, index) => `
                <tr style="animation-delay: ${index * 0.1}s">
                    <td>${task.id}</td>
                    <td>${task.name}</td>
                    <td><span class="status-badge ${task.status}">${task.status}</span></td>
                    <td>${task.active_subagents}个</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <div class="progress-bar" style="width: 100px; margin: 0;">
                                <div class="progress-fill" style="width: ${(task.progress * 100).toFixed(0)}%"></div>
                            </div>
                            <span>${(task.progress * 100).toFixed(1)}%</span>
                        </div>
                    </td>
                    <td>${task.started_at ? formatDuration(Date.now()/1000 - new Date(task.started_at).getTime()/1000) : '-'}</td>
                </tr>
            `).join('');
        }
        
        // 更新子 Agent 展示
        function updateSubagentGrid(tasks) {
            const grid = document.getElementById('subagent-grid');
            
            // 从任务中提取子 Agent 信息（简化版）
            let subagents = [];
            tasks.forEach(task => {
                const roles = ['世界观架构师', '大纲设计师', '角色塑造师', '剧情编织者'];
                for (let i = 0; i < task.active_subagents && i < roles.length; i++) {
                    subagents.push({
                        id: `subagent-${task.id}-${i}`,
                        role: roles[i],
                        status: 'working',
                        task_id: task.id
                    });
                }
            });
            
            if (subagents.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #64748b; padding: 40px;">暂无活跃子灵</div>';
                return;
            }
            
            grid.innerHTML = subagents.map((sa, index) => `
                <div class="subagent-card" style="animation: fadeInUp 0.5s ease ${index * 0.1}s backwards">
                    <div class="subagent-avatar">${getSubagentAvatar(sa.role)}</div>
                    <div class="subagent-role">${sa.role}</div>
                    <div class="subagent-status">
                        <span class="status-dot"></span>
                        <span>施法中</span>
                    </div>
                </div>
            `).join('');
        }
        
        // 格式化时长
        function formatDuration(seconds) {
            if (seconds < 60) return `${Math.floor(seconds)}秒`;
            if (seconds < 3600) return `${Math.floor(seconds/60)}分`;
            return `${Math.floor(seconds/3600)}小时${Math.floor((seconds%3600)/60)}分`;
        }
        
        // 倒计时
        setInterval(() => {
            countdown--;
            document.getElementById('next-refresh').textContent = countdown;
            if (countdown <= 0) {
                updateDashboard();
            }
        }, 1000);
        
        // 初始化
        createStars();
        updateDashboard();
    </script>
</body>
</html>
