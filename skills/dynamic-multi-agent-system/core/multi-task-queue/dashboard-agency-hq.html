<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Agency HQ - Agent 像素办公室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2d1b4e, #1a1a2e);
            padding: 20px 30px;
            border-bottom: 2px solid #8b5cf6;
            box-shadow: 0 4px 20px rgba(139,92,246,0.3);
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1600px;
            margin: 0 auto;
        }
        .header h1 {
            font-size: 24px;
            color: #8b5cf6;
            text-shadow: 0 0 20px rgba(139,92,246,0.5);
        }
        .header p {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-top: 8px;
        }
        .header-actions {
            display: flex;
            gap: 12px;
        }
        .btn {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139,92,246,0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139,92,246,0.6);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #8b5cf6;
        }
        .container {
            height: calc(100vh - 100px);
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,15,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(139,92,246,0.2);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spinnerRotate 1s linear infinite;
        }
        @keyframes spinnerRotate {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 16px;
            color: #8b5cf6;
            animation: loadingFade 1.5s ease-in-out infinite;
        }
        @keyframes loadingFade {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .status-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26,26,46,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139,92,246,0.3);
            border-radius: 12px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: statusBlink 1.5s ease-in-out infinite;
        }
        @keyframes statusBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .status-text {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
        .alert-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26,26,46,0.95);
            border: 2px solid #ef4444;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(239,68,68,0.4);
            z-index: 2000;
            max-width: 500px;
            display: none;
        }
        .alert-box h2 {
            color: #ef4444;
            font-size: 20px;
            margin-bottom: 15px;
        }
        .alert-box p {
            color: rgba(255,255,255,0.8);
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .alert-box code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #fbbf24;
        }
    </style>
</head>
<body>
    <!-- 顶部栏 -->
    <div class="header">
        <div class="header-content">
            <div>
                <h1>🏢 Agency HQ - Agent 像素办公室</h1>
                <p>实时查看 Agent 在办公室、会议室、厨房、游戏室的活动状态</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="checkConnection()">
                    🔍 检查连接
                </button>
                <button class="btn" onclick="openInNewWindow()">
                    🚀 在新窗口打开
                </button>
            </div>
        </div>
    </div>
    
    <!-- 主容器 -->
    <div class="container">
        <!-- 加载动画 -->
        <div class="loading-overlay" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载 Agency HQ...</div>
        </div>
        
        <!-- iframe -->
        <iframe id="agency-hq-frame" src="http://localhost:3000" frameborder="0"></iframe>
        
        <!-- 状态栏 -->
        <div class="status-bar" id="status-bar">
            <div class="status-dot" id="status-dot"></div>
            <div class="status-text" id="status-text">连接中...</div>
        </div>
        
        <!-- 错误提示 -->
        <div class="alert-box" id="alert-box">
            <h2>⚠️ 无法连接到 Agency HQ</h2>
            <p>请确保 Agency HQ 服务正在运行：</p>
            <p><code>cd D:\agency-hq-1.0.0</code><br><code>npm install</code><br><code>npm run dev</code></p>
            <button class="btn" onclick="retryConnection()">
                🔄 重试连接
            </button>
        </div>
    </div>
    
    <script>
        const AGENCY_HQ_URL = 'http://localhost:3000';
        let connectionRetries = 0;
        const maxRetries = 3;
        
        // 页面加载完成后检查连接
        window.addEventListener('load', () => {
            setTimeout(checkConnection, 2000);
        });
        
        // 检查连接
        async function checkConnection() {
            try {
                const response = await fetch(AGENCY_HQ_URL, { mode: 'no-cors' });
                updateStatus('connected', '已连接到 Agency HQ');
                hideLoading();
                hideAlert();
            } catch (error) {
                connectionRetries++;
                if (connectionRetries >= maxRetries) {
                    updateStatus('disconnected', '无法连接到 Agency HQ');
                    showLoading();
                    showAlert();
                } else {
                    updateStatus('retrying', `重试连接中... (${connectionRetries}/${maxRetries})`);
                    setTimeout(checkConnection, 2000);
                }
            }
        }
        
        // 重试连接
        function retryConnection() {
            connectionRetries = 0;
            hideAlert();
            showLoading();
            updateStatus('connecting', '正在连接...');
            setTimeout(checkConnection, 1000);
        }
        
        // 更新状态
        function updateStatus(status, text) {
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            
            statusText.textContent = text;
            
            if (status === 'connected') {
                statusDot.style.background = '#10b981';
                statusDot.style.boxShadow = '0 0 10px #10b981';
            } else if (status === 'disconnected') {
                statusDot.style.background = '#ef4444';
                statusDot.style.boxShadow = '0 0 10px #ef4444';
            } else if (status === 'retrying') {
                statusDot.style.background = '#f59e0b';
                statusDot.style.boxShadow = '0 0 10px #f59e0b';
            } else {
                statusDot.style.background = '#8b5cf6';
                statusDot.style.boxShadow = '0 0 10px #8b5cf6';
            }
        }
        
        // 显示/隐藏加载动画
        function showLoading() {
            document.getElementById('loading').style.display = 'flex';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        // 显示/隐藏警告
        function showAlert() {
            document.getElementById('alert-box').style.display = 'block';
        }
        
        function hideAlert() {
            document.getElementById('alert-box').style.display = 'none';
        }
        
        // 在新窗口打开
        function openInNewWindow() {
            window.open(AGENCY_HQ_URL, '_blank');
        }
        
        // iframe 加载完成
        document.getElementById('agency-hq-frame').addEventListener('load', () => {
            hideLoading();
            updateStatus('connected', 'Agency HQ 已加载');
        });
        
        // iframe 加载错误
        document.getElementById('agency-hq-frame').addEventListener('error', () => {
            updateStatus('disconnected', '加载失败');
            showAlert();
        });
    </script>
</body>
</html>
