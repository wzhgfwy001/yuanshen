<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法学院 - 多 Agent 队列监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #e0e0e0;
        }
        
        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* 标题 */
        header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease;
        }
        
        header h1 {
            font-size: 36px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin-bottom: 10px;
        }
        
        header p {
            color: #b0b0b0;
            font-size: 14px;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 主场景 */
        .magic-scene {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        /* 魔法师区域 */
        .mage-area {
            background: linear-gradient(180deg, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 2px solid #4a4a6a;
            box-shadow: 0 0 30px rgba(138,138,138,0.3);
            position: relative;
        }
        
        .mage-avatar {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            position: relative;
        }
        
        /* 魔法师形象（CSS 绘制） */
        .mage-figure {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        .mage-hat {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 100px solid #4a4a6a;
            animation: float 3s ease-in-out infinite;
        }
        
        .mage-hat::before {
            content: '⭐';
            position: absolute;
            top: 30px;
            left: -15px;
            font-size: 30px;
            animation: twinkle 1s ease-in-out infinite;
        }
        
        .mage-face {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 90px;
            background: #f0d0b0;
            border-radius: 40px;
        }
        
        .mage-eye {
            position: absolute;
            top: 30px;
            width: 12px;
            height: 12px;
            background: #1a1a2e;
            border-radius: 50%;
            animation: blink 4s ease-in-out infinite;
        }
        
        .mage-eye.left { left: 20px; }
        .mage-eye.right { right: 20px; }
        
        @keyframes blink {
            0%, 48%, 52%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.1); }
        }
        
        .mage-mouth {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 15px;
            background: #d0a080;
            border-radius: 0 0 15px 15px;
        }
        
        .mage-robe {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 80px;
            background: linear-gradient(180deg, #4a4a6a 0%, #2d2d44 100%);
            border-radius: 50px 50px 0 0;
        }
        
        .mage-wand {
            position: absolute;
            bottom: 20px;
            right: -20px;
            width: 8px;
            height: 100px;
            background: linear-gradient(180deg, #8b4513 0%, #654321 100%);
            border-radius: 4px;
            transform: rotate(-15deg);
            animation: castSpell 2s ease-in-out infinite;
        }
        
        .mage-wand::before {
            content: '✨';
            position: absolute;
            top: -20px;
            left: -10px;
            font-size: 30px;
            animation: sparkle 1s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }
        
        @keyframes castSpell {
            0%, 100% { transform: rotate(-15deg); }
            50% { transform: rotate(-25deg); }
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        
        .mage-stats {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #4a4a6a;
        }
        
        .mage-stats h3 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }
        
        .stat-label {
            color: #b0b0b0;
        }
        
        .stat-value {
            color: #ffd700;
            font-weight: bold;
        }
        
        /* 传送门区域 */
        .portal-area {
            position: relative;
            background: linear-gradient(180deg, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #4a4a6a;
            min-height: 500px;
        }
        
        .portal-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            justify-items: center;
        }
        
        /* 传送门 */
        .portal {
            width: 100px;
            height: 140px;
            background: linear-gradient(180deg, #4a0080 0%, #8000ff 50%, #4a0080 100%);
            border-radius: 50px 50px 0 0;
            position: relative;
            overflow: hidden;
            animation: portalPulse 2s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .portal:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(128,0,255,0.8);
        }
        
        .portal::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 300%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.3),
                transparent
            );
            animation: portalShimmer 3s infinite;
        }
        
        @keyframes portalPulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(128,0,255,0.5);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 40px rgba(128,0,255,0.8);
                transform: scale(1.02);
            }
        }
        
        @keyframes portalShimmer {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(50%); }
        }
        
        .portal-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: white;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 5px black;
        }
        
        /* 子 Agent 从传送门出现 */
        .subagent {
            position: absolute;
            width: 60px;
            height: 80px;
            background: linear-gradient(180deg, #60a5fa 0%, #3b82f6 100%);
            border-radius: 30px 30px 0 0;
            animation: spawnFromPortal 1s ease forwards;
            z-index: 10;
        }
        
        @keyframes spawnFromPortal {
            0% {
                opacity: 0;
                transform: translateY(50px) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateY(-80px) scale(1);
            }
        }
        
        .subagent::before {
            content: '🧑‍💼';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
        }
        
        .subagent-label {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: white;
            white-space: nowrap;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }
        
        .stat-card .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .stat-card .number {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 5px;
        }
        
        .stat-card .label {
            color: #b0b0b0;
            font-size: 14px;
        }
        
        /* 任务列表 */
        .task-section {
            background: linear-gradient(180deg, #2d2d44 0%, #1a1a2e 100%);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            border: 2px solid #4a4a6a;
        }
        
        .task-section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .task-list {
            list-style: none;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            border-left: 4px solid #4a4a6a;
            animation: slideIn 0.5s ease backwards;
        }
        
        .task-item:nth-child(1) { animation-delay: 0.1s; }
        .task-item:nth-child(2) { animation-delay: 0.2s; }
        .task-item:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .task-item.pending {
            border-left-color: #ea580c;
        }
        
        .task-item.running {
            border-left-color: #16a34a;
        }
        
        .task-item.completed {
            border-left-color: #2563eb;
        }
        
        .task-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 15px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .task-status.pending { background: #ea580c; }
        .task-status.running { background: #16a34a; }
        .task-status.completed { background: #2563eb; }
        
        .task-info {
            flex: 1;
        }
        
        .task-name {
            font-weight: bold;
            color: #e0e0e0;
            margin-bottom: 5px;
        }
        
        .task-detail {
            font-size: 12px;
            color: #808080;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* 刷新提示 */
        .refresh-hint {
            text-align: center;
            color: #808080;
            margin-top: 20px;
            font-size: 13px;
        }
        
        /* 魔法粒子效果 */
        .magic-particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #ffd700 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            animation: magicFloat 3s ease-in-out infinite;
        }
        
        @keyframes magicFloat {
            0%, 100% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-50px) scale(1);
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <header>
            <h1>🧙‍♀️ 魔法学院 - 多 Agent 队列监控</h1>
            <p>Magic Academy - Multi-Agent Queue Monitor</p>
        </header>
        
        <div class="magic-scene">
            <!-- 魔法师区域 -->
            <div class="mage-area">
                <div class="mage-avatar">
                    <div class="mage-figure">
                        <div class="mage-hat"></div>
                        <div class="mage-face">
                            <div class="mage-eye left"></div>
                            <div class="mage-eye right"></div>
                            <div class="mage-mouth"></div>
                        </div>
                        <div class="mage-robe"></div>
                        <div class="mage-wand"></div>
                    </div>
                </div>
                
                <div class="mage-stats">
                    <h3>🔮 魔法师状态</h3>
                    <div class="stat-row">
                        <span class="stat-label">魔法能量</span>
                        <span class="stat-value" id="magic-energy">100%</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">活跃咒语</span>
                        <span class="stat-value" id="active-spells">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">召唤次数</span>
                        <span class="stat-value" id="summon-count">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">完成任务</span>
                        <span class="stat-value" id="completed-tasks">0</span>
                    </div>
                </div>
            </div>
            
            <!-- 传送门区域 -->
            <div class="portal-area">
                <h3 style="color: #ffd700; margin-bottom: 20px; text-align: center;">🌀 子 Agent 传送门</h3>
                <div class="portal-container" id="portal-container">
                    <!-- 传送门会动态生成 -->
                </div>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">⏳</div>
                <div class="number" id="pending-count">0</div>
                <div class="label">待处理任务</div>
            </div>
            <div class="stat-card">
                <div class="icon">▶️</div>
                <div class="number" id="running-count">0</div>
                <div class="label">运行中任务</div>
            </div>
            <div class="stat-card">
                <div class="icon">✅</div>
                <div class="number" id="completed-count">0</div>
                <div class="label">今日完成</div>
            </div>
            <div class="stat-card">
                <div class="icon">🤖</div>
                <div class="number" id="subagent-count">0</div>
                <div class="label">活跃子 Agent</div>
            </div>
            <div class="stat-card">
                <div class="icon">💎</div>
                <div class="number" id="available-slots">3</div>
                <div class="label">可用任务槽位</div>
            </div>
            <div class="stat-card">
                <div class="icon">💚</div>
                <div class="number" id="system-status" style="font-size: 20px;">正常</div>
                <div class="label">系统状态</div>
            </div>
        </div>
        
        <!-- 任务列表 -->
        <div class="task-section">
            <h2>📜 当前任务</h2>
            <ul class="task-list" id="task-list">
                <li style="text-align: center; color: #808080; padding: 20px;">暂无任务</li>
            </ul>
        </div>
        
        <div class="refresh-hint">
            🔄 数据每 5 秒自动刷新 | 下次刷新：<span id="next-refresh">5</span>秒
        </div>
    </div>
    
    <script>
        // 创建星空背景
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                container.appendChild(star);
            }
        }
        
        createStars();
        
        // 创建魔法粒子
        function createMagicParticle() {
            const particle = document.createElement('div');
            particle.className = 'magic-particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            document.body.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 3000);
        }
        
        setInterval(createMagicParticle, 500);
        
        // API 地址
        const API_BASE = 'http://localhost:5000/api';
        
        // 倒计时
        let countdown = 5;
        let totalSummons = 0;
        
        // 更新仪表盘
        async function updateDashboard() {
            try {
                const response = await fetch(`${API_BASE}/queue/status`);
                const data = await response.json();
                
                // 更新统计
                document.getElementById('pending-count').textContent = data.pending.count;
                document.getElementById('running-count').textContent = data.running.count;
                document.getElementById('completed-count').textContent = data.completed.today;
                document.getElementById('subagent-count').textContent = data.running.active_subagents;
                document.getElementById('available-slots').textContent = data.resources.available_task_slots;
                
                // 更新魔法师状态
                document.getElementById('active-spells').textContent = data.running.count;
                document.getElementById('magic-energy').textContent = (100 - data.resources.usage_rate * 100).toFixed(0) + '%';
                document.getElementById('completed-tasks').textContent = data.completed.count;
                
                // 系统状态
                const statusEl = document.getElementById('system-status');
                if (data.resources.usage_rate > 0.9) {
                    statusEl.textContent = '高负载';
                    statusEl.style.color = '#dc2626';
                } else if (data.resources.usage_rate > 0.7) {
                    statusEl.textContent = '繁忙';
                    statusEl.style.color = '#ea580c';
                } else {
                    statusEl.textContent = '正常';
                    statusEl.style.color = '#16a34a';
                }
                
                // 更新传送门
                updatePortals(data.running.active_subagents);
                
                // 更新任务列表
                updateTaskList(data.pending.tasks, data.running.tasks);
                
            } catch (error) {
                console.error('获取数据失败:', error);
                // 使用模拟数据演示
                updateWithMockData();
            }
            
            countdown = 5;
        }
        
        // 更新传送门
        function updatePortals(subagentCount) {
            const container = document.getElementById('portal-container');
            container.innerHTML = '';
            
            for (let i = 0; i < subagentCount; i++) {
                const portal = document.createElement('div');
                portal.className = 'portal';
                portal.innerHTML = `<span class="portal-label">子 Agent ${i+1}</span>`;
                container.appendChild(portal);
                
                // 创建子 Agent 动画
                setTimeout(() => {
                    const subagent = document.createElement('div');
                    subagent.className = 'subagent';
                    subagent.innerHTML = `<span class="subagent-label">Agent ${i+1}</span>`;
                    portal.appendChild(subagent);
                    
                    totalSummons++;
                    document.getElementById('summon-count').textContent = totalSummons;
                }, i * 200);
            }
        }
        
        // 更新任务列表
        function updateTaskList(pending, running) {
            const list = document.getElementById('task-list');
            const allTasks = [...pending.map(t => ({...t, status: 'pending'})), ...running.map(t => ({...t, status: 'running'}))];
            
            if (allTasks.length === 0) {
                list.innerHTML = '<li style="text-align: center; color: #808080; padding: 20px;">暂无任务</li>';
                return;
            }
            
            list.innerHTML = allTasks.map(task => `
                <li class="task-item ${task.status}">
                    <div class="task-status ${task.status}"></div>
                    <div class="task-info">
                        <div class="task-name">${task.name || '未命名任务'}</div>
                        <div class="task-detail">
                            ID: ${task.id} | 
                            子 Agent: ${task.active_subagents || 0}个 |
                            进度：${(task.progress * 100).toFixed(1)}%
                        </div>
                    </div>
                </li>
            `).join('');
        }
        
        // 模拟数据演示
        function updateWithMockData() {
            const mockData = {
                pending: { count: 2, tasks: [{id: 'task-001', name: '科幻小说创作', active_subagents: 0, progress: 0}] },
                running: { count: 1, tasks: [{id: 'task-002', name: 'Excel 筛选器开发', active_subagents: 3, progress: 0.6}], active_subagents: 3 },
                completed: { count: 5, today: 2 },
                resources: { available_task_slots: 2, usage_rate: 0.25 }
            };
            
            document.getElementById('pending-count').textContent = mockData.pending.count;
            document.getElementById('running-count').textContent = mockData.running.count;
            document.getElementById('completed-count').textContent = mockData.completed.today;
            document.getElementById('subagent-count').textContent = mockData.running.active_subagents;
            document.getElementById('available-slots').textContent = mockData.resources.available_task_slots;
            document.getElementById('active-spells').textContent = mockData.running.count;
            document.getElementById('magic-energy').textContent = (100 - mockData.resources.usage_rate * 100).toFixed(0) + '%';
            document.getElementById('completed-tasks').textContent = mockData.completed.count;
            
            updatePortals(mockData.running.active_subagents);
            updateTaskList(mockData.pending.tasks, mockData.running.tasks);
        }
        
        // 倒计时
        setInterval(() => {
            countdown--;
            document.getElementById('next-refresh').textContent = countdown;
            if (countdown <= 0) {
                updateDashboard();
            }
        }, 1000);
        
        // 初始加载（使用模拟数据演示）
        updateWithMockData();
    </script>
</body>
</html>
