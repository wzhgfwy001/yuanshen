<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多 Agent 队列实时监控 - 动画版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 1s ease;
        }
        
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        /* 动画关键帧 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        @keyframes numberRoll {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes progressGrow {
            from { width: 0; }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        /* 卡片样式 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s;
            animation: fadeInUp 0.6s ease backwards;
            position: relative;
            overflow: hidden;
        }
        
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        /* 卡片背景装饰 */
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        
        .card-icon {
            font-size: 32px;
            margin-right: 15px;
            animation: float 3s ease-in-out infinite;
        }
        
        .card-title {
            font-size: 16px;
            color: #64748b;
            font-weight: 500;
        }
        
        .metric {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
            transition: all 0.3s;
        }
        
        .metric.pending { 
            color: #ea580c;
            animation: pulse 2s ease-in-out infinite;
        }
        .metric.running { 
            color: #16a34a;
            animation: pulse 2s ease-in-out infinite;
            animation-delay: 0.5s;
        }
        .metric.completed { 
            color: #2563eb;
            animation: pulse 2s ease-in-out infinite;
            animation-delay: 1s;
        }
        
        .card-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2e8f0;
            font-size: 13px;
            color: #64748b;
            position: relative;
            z-index: 1;
        }
        
        /* 进度条动画 */
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e2e8f0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s ease;
            position: relative;
            animation: progressGrow 1s ease forwards;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.3),
                transparent
            );
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }
        
        /* 详情区域 */
        .details-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeInUp 0.8s ease;
        }
        
        .details-section h2 {
            margin-bottom: 20px;
            color: #1e293b;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #64748b;
        }
        
        tr {
            animation: slideIn 0.5s ease backwards;
        }
        
        tr:nth-child(1) { animation-delay: 0.1s; }
        tr:nth-child(2) { animation-delay: 0.2s; }
        tr:nth-child(3) { animation-delay: 0.3s; }
        tr:nth-child(4) { animation-delay: 0.4s; }
        tr:nth-child(5) { animation-delay: 0.5s; }
        
        tr:hover {
            background: linear-gradient(90deg, rgba(102,126,234,0.05), rgba(118,75,162,0.05));
            transform: scale(1.01);
            transition: all 0.3s;
        }
        
        /* 状态徽章动画 */
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            animation: bounce 2s ease-in-out infinite;
        }
        
        .status-badge.pending {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #92400e;
        }
        
        .status-badge.running {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #166534;
        }
        
        .status-badge.completed {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e40af;
        }
        
        /* 刷新信息 */
        .refresh-info {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 13px;
            animation: fadeInUp 1s ease;
        }
        
        /* 告警框动画 */
        .alert-box {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            border: 2px solid #fecaca;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            animation: fadeInDown 0.5s ease;
            box-shadow: 0 5px 15px rgba(220,38,38,0.2);
        }
        
        .alert-box h3 {
            color: #dc2626;
            margin-bottom: 10px;
            animation: pulse 1s ease-in-out infinite;
        }
        
        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102,126,234,0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }
        
        /* 粒子背景 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <header>
            <h1>📊 多 Agent 队列实时监控</h1>
            <p>Multi-Agent Queue Real-time Monitor</p>
        </header>
        
        <!-- 告警区域 -->
        <div id="alert-container"></div>
        
        <!-- 仪表盘 -->
        <div class="dashboard">
            <!-- 待处理任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">⏳</span>
                    <span class="card-title">待处理队列</span>
                </div>
                <div class="metric pending" id="pending-count">0</div>
                <div class="card-footer">
                    等待执行的任务
                    <div class="progress-bar">
                        <div class="progress-fill" id="pending-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <!-- 运行中任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">▶️</span>
                    <span class="card-title">运行中任务</span>
                </div>
                <div class="metric running" id="running-count">0</div>
                <div class="card-footer">
                    活跃子 Agent: <span id="active-subagents">0</span> / 12
                    <div class="progress-bar">
                        <div class="progress-fill" id="subagent-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            
            <!-- 已完成任务 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">✅</span>
                    <span class="card-title">今日完成</span>
                </div>
                <div class="metric completed" id="completed-count">0</div>
                <div class="card-footer">
                    总完成：<span id="total-completed">0</span>
                </div>
            </div>
            
            <!-- 可用资源 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🎯</span>
                    <span class="card-title">可用任务槽位</span>
                </div>
                <div class="metric" id="task-slots" style="color: #2563eb">3</div>
                <div class="card-footer">
                    最大并发：3 个任务
                </div>
            </div>
            
            <!-- 子 Agent 使用率 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">🤖</span>
                    <span class="card-title">子 Agent 使用率</span>
                </div>
                <div class="metric" id="subagent-usage" style="color: #16a34a">0%</div>
                <div class="card-footer">
                    可用：<span id="available-subagents">12</span> / 12
                </div>
            </div>
            
            <!-- 系统状态 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-icon">💚</span>
                    <span class="card-title">系统状态</span>
                </div>
                <div class="metric" id="system-status" style="color: #16a34a; font-size: 24px;">正常</div>
                <div class="card-footer">
                    最后更新：<span id="last-update">--:--:--</span>
                </div>
            </div>
        </div>
        
        <!-- 任务详情 -->
        <div class="details-section">
            <h2>📋 运行中任务详情</h2>
            <table>
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>任务名称</th>
                        <th>状态</th>
                        <th>子 Agent</th>
                        <th>进度</th>
                        <th>耗时</th>
                    </tr>
                </thead>
                <tbody id="task-table-body">
                    <tr>
                        <td colspan="6" style="text-align: center; color: #94a3b8;">暂无运行中任务</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="refresh-info">
            🔄 数据每 5 秒自动刷新 | 下次刷新：<span id="next-refresh">5</span>秒
        </div>
    </div>
    
    <script>
        // 创建粒子背景
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 10 + 5 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(particle);
            }
        }
        
        createParticles();
        
        // API 地址
        const API_BASE = 'http://localhost:5000/api';
        
        // 倒计时
        let countdown = 5;
        
        // 数字滚动动画
        function animateNumber(element, target, duration = 1000) {
            const start = 0;
            const increment = target / (duration / 16);
            let current = start;
            
            const timer = setInterval(() => {
                current += increment;
                if (current >= target) {
                    current = target;
                    clearInterval(timer);
                }
                element.textContent = Math.floor(current);
            }, 16);
        }
        
        // 更新仪表盘
        async function updateDashboard() {
            try {
                const response = await fetch(`${API_BASE}/queue/status`);
                const data = await response.json();
                
                // 数字滚动动画
                animateNumber(document.getElementById('pending-count'), data.pending.count);
                animateNumber(document.getElementById('running-count'), data.running.count);
                animateNumber(document.getElementById('completed-count'), data.completed.today);
                animateNumber(document.getElementById('total-completed'), data.completed.count);
                animateNumber(document.getElementById('task-slots'), data.resources.available_task_slots);
                animateNumber(document.getElementById('active-subagents'), data.running.active_subagents);
                animateNumber(document.getElementById('available-subagents'), data.resources.available_subagents);
                
                // 使用率
                const usage = (data.resources.usage_rate * 100).toFixed(1);
                document.getElementById('subagent-usage').textContent = usage + '%';
                
                // 进度条动画
                document.getElementById('pending-bar').style.width = Math.min(data.pending.count / 10 * 100, 100) + '%';
                document.getElementById('subagent-bar').style.width = usage + '%';
                
                // 系统状态
                const statusEl = document.getElementById('system-status');
                if (data.resources.usage_rate > 0.9) {
                    statusEl.textContent = '高负载';
                    statusEl.style.color = '#dc2626';
                    statusEl.style.animation = 'pulse 1s ease-in-out infinite';
                } else if (data.resources.usage_rate > 0.7) {
                    statusEl.textContent = '繁忙';
                    statusEl.style.color = '#ea580c';
                    statusEl.style.animation = 'pulse 2s ease-in-out infinite';
                } else {
                    statusEl.textContent = '正常';
                    statusEl.style.color = '#16a34a';
                    statusEl.style.animation = 'none';
                }
                
                // 更新时间
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
                
                // 检查告警
                checkAlerts(data);
                
                // 更新任务详情表
                updateTaskTable(data.running.tasks);
                
            } catch (error) {
                console.error('获取数据失败:', error);
            }
            
            countdown = 5;
        }
        
        // 检查告警
        function checkAlerts(data) {
            const alertContainer = document.getElementById('alert-container');
            
            if (data.resources.usage_rate > 0.9 || data.pending.count > 10) {
                alertContainer.innerHTML = `
                    <div class="alert-box">
                        <h3>⚠️ 系统告警</h3>
                        <ul>
                            ${data.resources.usage_rate > 0.9 ? '<li>子 Agent 使用率超过 90%</li>' : ''}
                            ${data.pending.count > 10 ? `<li>待处理任务过多：${data.pending.count}个</li>` : ''}
                        </ul>
                    </div>
                `;
            } else {
                alertContainer.innerHTML = '';
            }
        }
        
        // 更新任务详情表
        function updateTaskTable(tasks) {
            const tbody = document.getElementById('task-table-body');
            
            if (tasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #94a3b8;">暂无运行中任务</td></tr>';
                return;
            }
            
            tbody.innerHTML = tasks.map(task => `
                <tr>
                    <td>${task.id}</td>
                    <td>${task.name}</td>
                    <td><span class="status-badge ${task.status}">${task.status}</span></td>
                    <td>${task.active_subagents}个</td>
                    <td>${(task.progress * 100).toFixed(1)}%</td>
                    <td>${task.started_at ? formatDuration(Date.now()/1000 - new Date(task.started_at).getTime()/1000) : '-'}</td>
                </tr>
            `).join('');
        }
        
        // 格式化时长
        function formatDuration(seconds) {
            if (seconds < 60) return `${Math.floor(seconds)}秒`;
            if (seconds < 3600) return `${Math.floor(seconds/60)}分`;
            return `${Math.floor(seconds/3600)}小时${Math.floor((seconds%3600)/60)}分`;
        }
        
        // 倒计时动画
        setInterval(() => {
            countdown--;
            document.getElementById('next-refresh').textContent = countdown;
            if (countdown <= 0) {
                updateDashboard();
            }
        }, 1000);
        
        // 初始加载
        updateDashboard();
    </script>
</body>
</html>
