<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法教堂 - 多 Agent 实时监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            image-rendering: pixelated;
        }
        
        /* 主容器 */
        .dashboard {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            gap: 20px;
            height: 100vh;
            padding: 20px;
        }
        
        /* 面板样式 */
        .panel {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 2px solid #3a3a5a;
            border-radius: 10px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(58,58,90,0.5);
        }
        
        .panel-title {
            color: #ffd700;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
            border-bottom: 1px solid #3a3a5a;
            padding-bottom: 10px;
        }
        
        /* 左侧：统计面板 */
        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .stat-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid #3a3a5a;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.5);
        }
        
        .stat-label {
            font-size: 12px;
            color: #808080;
            margin-top: 5px;
        }
        
        /* 中间：教堂场景 */
        .church-scene {
            position: relative;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 100%);
            border: 2px solid #3a3a5a;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .church-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 50px,
                    rgba(58,58,90,0.3) 50px,
                    rgba(58,58,90,0.3) 52px
                );
        }
        
        /* 彩色玻璃窗 */
        .stained-glass {
            position: absolute;
            top: 20px;
            width: 100px;
            height: 150px;
            background: linear-gradient(180deg, #4a0080 0%, #8000ff 50%, #4a0080 100%);
            border: 3px solid #ffd700;
            box-shadow: 0 0 30px rgba(128,0,255,0.5);
        }
        
        .stained-glass.left { left: 50px; }
        .stained-glass.right { right: 50px; }
        
        /* 祭坛 */
        .altar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 100px;
            background: linear-gradient(180deg, #4a4a6a 0%, #2d2d44 100%);
            border: 2px solid #ffd700;
            border-radius: 5px;
        }
        
        /* 蜡烛 */
        .candle {
            position: absolute;
            width: 10px;
            height: 30px;
            background: #f0e0d0;
            border-radius: 2px;
        }
        
        .candle::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 15px;
            background: radial-gradient(ellipse at center, #ffd700 0%, #ff8c00 50%, transparent 70%);
            border-radius: 50%;
            animation: flicker 0.5s ease-in-out infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 0.8; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
        }
        
        .candle.left { 
            position: absolute;
            bottom: 100px;
            left: calc(50% - 120px);
        }
        
        .candle.right { 
            position: absolute;
            bottom: 100px;
            right: calc(50% - 120px);
        }
        
        /* 长椅 */
        .bench {
            position: absolute;
            width: 120px;
            height: 40px;
            background: linear-gradient(180deg, #654321 0%, #4a3015 100%);
            border: 2px solid #3a2010;
            border-radius: 3px;
        }
        
        .bench-row-1 { bottom: 150px; left: 100px; }
        .bench-row-2 { bottom: 150px; right: 100px; }
        .bench-row-3 { bottom: 200px; left: 150px; }
        .bench-row-4 { bottom: 200px; right: 150px; }
        
        /* 书柜 */
        .bookshelf {
            position: absolute;
            width: 80px;
            height: 120px;
            background: linear-gradient(180deg, #654321 0%, #4a3015 100%);
            border: 2px solid #3a2010;
            display: grid;
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            padding: 5px;
        }
        
        .bookshelf.left { 
            bottom: 100px; 
            left: 30px;
        }
        
        .bookshelf.right { 
            bottom: 100px; 
            right: 30px;
        }
        
        .book {
            background: linear-gradient(90deg, #800000 0%, #a00000 50%, #800000 100%);
            border: 1px solid #600000;
            border-radius: 2px;
        }
        
        /* 角色像素画 */
        .pixel-character {
            position: absolute;
            width: 40px;
            height: 60px;
            image-rendering: pixelated;
            transition: all 0.5s;
        }
        
        /* 女魔法师（主 Agent） */
        .mage-main {
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .mage-main .hat {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 25px solid #4a4a6a;
        }
        
        .mage-main .hat::before {
            content: '⭐';
            position: absolute;
            top: 8px;
            left: -8px;
            font-size: 12px;
            animation: twinkle 1s ease-in-out infinite;
        }
        
        .mage-main .body {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 35px;
            background: linear-gradient(180deg, #4a4a6a 0%, #2d2d44 100%);
            border-radius: 5px;
        }
        
        .mage-main .wand {
            position: absolute;
            top: 25px;
            right: -10px;
            width: 4px;
            height: 30px;
            background: linear-gradient(180deg, #8b4513 0%, #654321 100%);
            transform: rotate(-20deg);
            animation: castSpell 2s ease-in-out infinite;
        }
        
        @keyframes castSpell {
            0%, 100% { transform: rotate(-20deg); }
            50% { transform: rotate(-30deg); }
        }
        
        /* 天使（用户） */
        .angel {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 50px;
        }
        
        .angel .wings {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 30px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.8) 0%, transparent 70%);
            animation: flap 2s ease-in-out infinite;
        }
        
        @keyframes flap {
            0%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(0.8); }
        }
        
        .angel .body {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 30px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .angel .halo {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 5px;
            border: 2px solid #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,215,0,0.8);
        }
        
        /* 子 Agent 魔法师 */
        .subagent-mage {
            opacity: 0;
        }
        
        .subagent-mage.active {
            opacity: 1;
            animation: walkToWork 3s ease-in-out forwards;
        }
        
        @keyframes walkToWork {
            0% { 
                opacity: 0;
                transform: translateX(-50%) translateY(0);
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateX(-50%) translateY(-50px);
            }
        }
        
        /* 召唤门 */
        .portal {
            position: absolute;
            width: 80px;
            height: 120px;
            background: radial-gradient(ellipse at center, #8000ff 0%, #4a0080 50%, transparent 70%);
            border: 3px solid #ffd700;
            border-radius: 50%;
            opacity: 0;
            transform: scale(0);
        }
        
        .portal.active {
            opacity: 1;
            animation: portalOpen 1s ease forwards, portalPulse 2s ease-in-out infinite;
        }
        
        @keyframes portalOpen {
            0% { 
                opacity: 0;
                transform: scale(0);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes portalPulse {
            0%, 100% { 
                box-shadow: 0 0 20px rgba(128,0,255,0.5);
            }
            50% { 
                box-shadow: 0 0 40px rgba(128,0,255,0.8);
            }
        }
        
        /* 咒语文字 */
        .spell-text {
            position: absolute;
            color: #ffd700;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
            opacity: 0;
            animation: spellCast 2s ease forwards;
        }
        
        @keyframes spellCast {
            0% {
                opacity: 0;
                transform: translateY(0);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-30px);
            }
        }
        
        /* 右侧：任务列表 */
        .task-list {
            list-style: none;
        }
        
        .task-item {
            background: rgba(255,255,255,0.05);
            border-left: 3px solid #3a3a5a;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            animation: slideIn 0.5s ease backwards;
        }
        
        .task-item.pending { border-left-color: #ea580c; }
        .task-item.running { border-left-color: #16a34a; }
        .task-item.completed { border-left-color: #2563eb; }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .task-name {
            font-size: 14px;
            font-weight: bold;
            color: #e0e0e0;
            margin-bottom: 5px;
        }
        
        .task-detail {
            font-size: 11px;
            color: #808080;
        }
        
        /* 状态指示器 */
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .status-indicator.pending { background: #ea580c; }
        .status-indicator.running { background: #16a34a; }
        .status-indicator.completed { background: #2563eb; }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        /* Token 消耗 */
        .token-stats {
            margin-top: 20px;
        }
        
        .token-bar {
            height: 20px;
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .token-fill {
            height: 100%;
            background: linear-gradient(90deg, #16a34a 0%, #10b981 100%);
            transition: width 0.5s;
        }
        
        /* 刷新提示 */
        .refresh-hint {
            text-align: center;
            color: #808080;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- 左侧：统计面板 -->
        <div class="panel stats-panel">
            <div class="panel-title">📊 系统统计</div>
            
            <div class="stat-box">
                <div class="stat-value" id="pending-count">0</div>
                <div class="stat-label">待处理任务</div>
            </div>
            
            <div class="stat-box">
                <div class="stat-value" id="running-count">0</div>
                <div class="stat-label">运行中任务</div>
            </div>
            
            <div class="stat-box">
                <div class="stat-value" id="completed-count">0</div>
                <div class="stat-label">今日完成</div>
            </div>
            
            <div class="stat-box">
                <div class="stat-value" id="subagent-count">0</div>
                <div class="stat-label">活跃子 Agent</div>
            </div>
            
            <div class="stat-box">
                <div class="stat-value" id="token-usage">0</div>
                <div class="stat-label">Token 消耗</div>
            </div>
            
            <div class="token-stats">
                <div class="panel-title">💎 Token 使用</div>
                <div class="token-bar">
                    <div class="token-fill" id="token-bar" style="width: 0%"></div>
                </div>
                <div style="font-size: 12px; color: #808080;">
                    已用：<span id="token-used">0</span> / <span id="token-total">1000000</span>
                </div>
            </div>
        </div>
        
        <!-- 中间：教堂场景 -->
        <div class="panel church-scene">
            <div class="church-bg"></div>
            
            <!-- 彩色玻璃窗 -->
            <div class="stained-glass left"></div>
            <div class="stained-glass right"></div>
            
            <!-- 蜡烛 -->
            <div class="candle left"></div>
            <div class="candle right"></div>
            
            <!-- 祭坛 -->
            <div class="altar"></div>
            
            <!-- 天使（用户） -->
            <div class="angel">
                <div class="halo"></div>
                <div class="wings"></div>
                <div class="body"></div>
            </div>
            
            <!-- 女魔法师（主 Agent） -->
            <div class="pixel-character mage-main" id="main-mage">
                <div class="hat"></div>
                <div class="body"></div>
                <div class="wand"></div>
            </div>
            
            <!-- 书柜 -->
            <div class="bookshelf left">
                <div class="book"></div>
                <div class="book"></div>
                <div class="book"></div>
            </div>
            <div class="bookshelf right">
                <div class="book"></div>
                <div class="book"></div>
                <div class="book"></div>
            </div>
            
            <!-- 长椅 -->
            <div class="bench bench-row-1"></div>
            <div class="bench bench-row-2"></div>
            <div class="bench bench-row-3"></div>
            <div class="bench bench-row-4"></div>
            
            <!-- 召唤门（动态生成） -->
            <div class="portal" id="portal-1" style="bottom: 150px; left: 30%;"></div>
            <div class="portal" id="portal-2" style="bottom: 150px; right: 30%;"></div>
            
            <!-- 子 Agent（动态生成） -->
        </div>
        
        <!-- 右侧：任务列表 -->
        <div class="panel">
            <div class="panel-title">📜 当前任务</div>
            <ul class="task-list" id="task-list">
                <li style="text-align: center; color: #808080; padding: 20px;">暂无任务</li>
            </ul>
            
            <div class="refresh-hint">
                🔄 数据每 5 秒自动刷新 | 下次刷新：<span id="next-refresh">5</span>秒
            </div>
        </div>
    </div>
    
    <script>
        // API 地址
        const API_BASE = 'http://localhost:5000/api';
        
        // 倒计时
        let countdown = 5;
        
        // 更新仪表盘
        async function updateDashboard() {
            try {
                const response = await fetch(`${API_BASE}/queue/status`);
                const data = await response.json();
                
                // 更新统计
                document.getElementById('pending-count').textContent = data.pending.count;
                document.getElementById('running-count').textContent = data.running.count;
                document.getElementById('completed-count').textContent = data.completed.today;
                document.getElementById('subagent-count').textContent = data.running.active_subagents;
                
                // 更新 Token 使用（模拟）
                const tokenUsed = data.running.active_subagents * 10000;
                document.getElementById('token-usage').textContent = tokenUsed.toLocaleString();
                document.getElementById('token-used').textContent = tokenUsed.toLocaleString();
                document.getElementById('token-bar').style.width = (tokenUsed / 1000000 * 100) + '%';
                
                // 更新场景动画
                updateScene(data);
                
                // 更新任务列表
                updateTaskList(data.pending.tasks, data.running.tasks);
                
            } catch (error) {
                console.error('获取数据失败:', error);
                // 使用模拟数据演示
                updateWithMockData();
            }
            
            countdown = 5;
        }
        
        // 更新场景动画
        function updateScene(data) {
            const subagentCount = data.running.active_subagents;
            
            // 清除旧的子 Agent
            document.querySelectorAll('.subagent-mage').forEach(el => el.remove());
            
            // 创建子 Agent
            for (let i = 0; i < subagentCount; i++) {
                const subagent = document.createElement('div');
                subagent.className = 'pixel-character subagent-mage active';
                subagent.style.bottom = (150 + i * 20) + 'px';
                subagent.style.left = (40 + i * 10) + '%';
                
                // 根据任务类型设置不同颜色
                const colors = ['#60a5fa', '#f472b6', '#34d399', '#fbbf24'];
                const color = colors[i % colors.length];
                
                subagent.innerHTML = `
                    <div class="hat" style="border-bottom-color: ${color}"></div>
                    <div class="body" style="background: linear-gradient(180deg, ${color} 0%, ${color}80 100%)"></div>
                    <div class="wand"></div>
                `;
                
                document.querySelector('.church-scene').appendChild(subagent);
                
                // 激活召唤门动画
                const portal = document.getElementById(`portal-${(i % 2) + 1}`);
                if (portal) {
                    portal.classList.add('active');
                    setTimeout(() => portal.classList.remove('active'), 2000);
                }
            }
        }
        
        // 更新任务列表
        function updateTaskList(pending, running) {
            const list = document.getElementById('task-list');
            const allTasks = [...pending.map(t => ({...t, status: 'pending'})), ...running.map(t => ({...t, status: 'running'}))];
            
            if (allTasks.length === 0) {
                list.innerHTML = '<li style="text-align: center; color: #808080; padding: 20px;">暂无任务</li>';
                return;
            }
            
            list.innerHTML = allTasks.map(task => `
                <li class="task-item ${task.status}">
                    <div class="task-name">
                        <span class="status-indicator ${task.status}"></span>
                        ${task.name || '未命名任务'}
                    </div>
                    <div class="task-detail">
                        ID: ${task.id} | 
                        子 Agent: ${task.active_subagents || 0}个 |
                        进度：${(task.progress * 100).toFixed(1)}%
                    </div>
                </li>
            `).join('');
        }
        
        // 模拟数据演示
        function updateWithMockData() {
            const mockData = {
                pending: { count: 2, tasks: [{id: 'task-001', name: '科幻小说创作', active_subagents: 0, progress: 0}] },
                running: { count: 1, tasks: [{id: 'task-002', name: 'Excel 筛选器开发', active_subagents: 3, progress: 0.6}], active_subagents: 3 },
                completed: { count: 5, today: 2 },
                resources: { available_task_slots: 2, usage_rate: 0.25 }
            };
            
            document.getElementById('pending-count').textContent = mockData.pending.count;
            document.getElementById('running-count').textContent = mockData.running.count;
            document.getElementById('completed-count').textContent = mockData.completed.today;
            document.getElementById('subagent-count').textContent = mockData.running.active_subagents;
            
            updateScene(mockData);
            updateTaskList(mockData.pending.tasks, mockData.running.tasks);
        }
        
        // 倒计时
        setInterval(() => {
            countdown--;
            document.getElementById('next-refresh').textContent = countdown;
            if (countdown <= 0) {
                updateDashboard();
            }
        }, 1000);
        
        // 初始加载（使用模拟数据演示）
        updateWithMockData();
    </script>
</body>
</html>
