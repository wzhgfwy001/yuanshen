<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⛪ 魔法教堂监控 - Pixel Art Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }
        
        /* 主容器 */
        .dashboard {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 70px 1fr 180px;
            gap: 10px;
            height: 100vh;
            padding: 15px;
        }
        
        /* 顶部栏 */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, #2d1b4e, #1a1a2e);
            border: 3px solid #e94560;
            border-radius: 0;
            padding: 0 25px;
            box-shadow: 0 0 20px rgba(233,69,96,0.5);
            image-rendering: pixelated;
        }
        
        .header h1 {
            font-size: 24px;
            color: #e94560;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #a855f7;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            letter-spacing: 2px;
        }
        
        .header-stats {
            display: flex;
            gap: 25px;
        }
        
        .header-stat {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 8px 15px;
            border: 2px solid #e94560;
        }
        
        .header-stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #fbbf24;
            font-family: 'Press Start 2P', monospace;
        }
        
        .header-stat-label {
            font-size: 10px;
            color: #a2a8d3;
            text-transform: uppercase;
            margin-top: 3px;
        }
        
        /* 左侧面板 */
        .left-panel {
            grid-row: 2 / 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* 右侧面板 */
        .right-panel {
            grid-row: 2 / 4;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* 中央场景 */
        .center-scene {
            grid-row: 2 / 4;
            position: relative;
            background: #0f0f1a;
            border: 3px solid #a855f7;
            overflow: hidden;
        }
        
        /* 底部面板 */
        .bottom-panel {
            grid-column: 1 / 2;
            grid-row: 3 / 4;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* 卡片通用样式 - 像素风格 */
        .card {
            background: linear-gradient(180deg, #2d1b4e, #1a1a2e);
            border: 3px solid #e94560;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.5);
            padding: 15px;
            position: relative;
        }
        
        .card-title {
            font-size: 12px;
            color: #fbbf24;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Press Start 2P', monospace;
            text-shadow: 2px 2px 0 #000;
        }
        
        .card-title::before {
            content: '►';
            color: #e94560;
        }
        
        /* 像素风任务列表 */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .task-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 2px solid #e94560;
            transition: all 0.2s;
        }
        
        .task-item:hover {
            background: rgba(233,69,96,0.2);
            transform: translate(2px, 2px);
            box-shadow: 3px 3px 0 rgba(233,69,96,0.3);
        }
        
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-name {
            font-size: 11px;
            color: #e0e0e0;
            font-family: 'Press Start 2P', monospace;
        }
        
        .task-status {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-pixel {
            width: 10px;
            height: 10px;
            image-rendering: pixelated;
        }
        
        .status-pixel.running { 
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }
        .status-pixel.pending { 
            background: #fbbf24;
            box-shadow: 0 0 10px #fbbf24;
        }
        .status-pixel.failed { 
            background: #dc2626;
            box-shadow: 0 0 10px #dc2626;
        }
        
        .task-progress-bar {
            height: 12px;
            background: #000;
            border: 2px solid #e94560;
            position: relative;
            overflow: hidden;
        }
        
        .task-progress-fill {
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                #e94560,
                #e94560 8px,
                #ff6b6b 8px,
                #ff6b6b 16px
            );
            transition: width 0.5s steps(8);
        }
        
        /* 像素风圆形仪表 */
        .gauge-pixel {
            position: relative;
            width: 100px;
            height: 100px;
            background: #000;
            border: 3px solid #e94560;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto;
        }
        
        .gauge-pixel-inner {
            width: 70px;
            height: 70px;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #a855f7;
        }
        
        .gauge-number {
            font-size: 20px;
            font-weight: bold;
            color: #fbbf24;
            font-family: 'Press Start 2P', monospace;
        }
        
        .gauge-label {
            font-size: 8px;
            color: #a2a8d3;
            text-transform: uppercase;
            margin-top: 3px;
        }
        
        /* 像素风进度条 */
        .progress-pixel {
            margin-bottom: 12px;
        }
        
        .progress-pixel-header {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-bottom: 5px;
            font-family: 'Press Start 2P', monospace;
        }
        
        .progress-pixel-bar {
            height: 16px;
            background: #000;
            border: 2px solid #e94560;
            position: relative;
        }
        
        .progress-pixel-fill {
            height: 100%;
            background: repeating-linear-gradient(
                90deg,
                #e94560,
                #e94560 4px,
                #ff6b6b 4px,
                #ff6b6b 8px
            );
            transition: width 0.3s steps(4);
        }
        
        .progress-pixel-fill.beta {
            background: repeating-linear-gradient(
                90deg,
                #f59e0b,
                #f59e0b 4px,
                #fbbf24 4px,
                #fbbf24 8px
            );
        }
        
        .progress-pixel-fill.gamma {
            background: repeating-linear-gradient(
                90deg,
                #10b981,
                #10b981 4px,
                #34d399 4px,
                #34d399 8px
            );
        }
        
        /* 像素风告警 */
        .alert-pixel {
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(220,38,38,0.2);
            border-left: 4px solid #dc2626;
            font-size: 10px;
            font-family: 'Press Start 2P', monospace;
            animation: alertBlink 1s steps(2) infinite;
        }
        
        @keyframes alertBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .alert-title {
            color: #dc2626;
            margin-bottom: 5px;
        }
        
        .alert-desc {
            color: #fca5a5;
            font-size: 9px;
            line-height: 1.5;
        }
        
        /* 像素风场景容器 */
        .pixel-scene {
            position: relative;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            overflow: hidden;
            image-rendering: pixelated;
        }
        
        /* 教堂地板 - 等距视角 */
        .church-floor {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 60%;
            background: 
                repeating-linear-gradient(
                    45deg,
                    #2d1b4e,
                    #2d1b4e 20px,
                    #1a1a2e 20px,
                    #1a1a2e 40px
                );
            border-top: 4px solid #e94560;
            border-left: 4px solid #a855f7;
            border-right: 4px solid #a855f7;
        }
        
        /* 教堂墙壁 */
        .church-wall {
            position: absolute;
            top: 20%;
            left: 10%;
            width: 80%;
            height: 40%;
            background: #2d1b4e;
            border: 4px solid #e94560;
        }
        
        /* 彩色玻璃窗 */
        .stained-glass {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 80px;
            background: 
                linear-gradient(90deg, 
                    transparent 0%, 
                    #e94560 20%, 
                    #a855f7 40%, 
                    #3b82f6 60%, 
                    #10b981 80%, 
                    transparent 100%
                );
            border: 3px solid #fbbf24;
            box-shadow: 0 0 30px rgba(233,69,96,0.5);
        }
        
        /* 祭坛 */
        .altar {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 60px;
            background: #1a1a2e;
            border: 3px solid #fbbf24;
        }
        
        /* 蜡烛 */
        .candle {
            position: absolute;
            width: 8px;
            height: 20px;
            background: #fbbf24;
            bottom: 35%;
        }
        
        .candle-left { left: 42%; }
        .candle-right { right: 42%; }
        
        .candle-flame {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 12px;
            height: 12px;
            background: #fbbf24;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flameFlicker 0.5s steps(2) infinite;
            box-shadow: 0 0 20px #fbbf24, 0 0 40px #f59e0b;
        }
        
        @keyframes flameFlicker {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
            50% { transform: translateX(-50%) scale(1.1); opacity: 0.8; }
        }
        
        /* 女魔法师 - 像素风格 */
        .pixel-mage {
            position: absolute;
            bottom: 32%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 64px;
            filter: drop-shadow(0 0 10px rgba(233,69,96,0.8));
            animation: mageIdle 2s steps(4) infinite;
            z-index: 10;
        }
        
        @keyframes mageIdle {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-3px); }
        }
        
        /* 魔法书 */
        .magic-book {
            position: absolute;
            bottom: 30%;
            left: 55%;
            font-size: 32px;
            animation: bookFloat 3s steps(6) infinite;
        }
        
        @keyframes bookFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        
        /* 魔法粒子 */
        .pixel-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #e94560;
            box-shadow: 0 0 10px #e94560;
            animation: particleFloat 2s steps(4) infinite;
        }
        
        @keyframes particleFloat {
            0%, 100% { 
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            50% { 
                transform: translate(10px, -20px) scale(0.5);
                opacity: 0.5;
            }
        }
        
        /* 悬浮数据框 - 像素风 */
        .pixel-tooltip {
            position: absolute;
            background: #1a1a2e;
            border: 3px solid #e94560;
            padding: 10px;
            font-size: 10px;
            font-family: 'Press Start 2P', monospace;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.5);
            animation: tooltipFloat 3s steps(6) infinite;
        }
        
        .tooltip-1 {
            top: 20%;
            left: 15%;
            animation-delay: 0s;
        }
        
        .tooltip-2 {
            top: 30%;
            right: 15%;
            animation-delay: 0.5s;
        }
        
        .tooltip-3 {
            bottom: 25%;
            left: 20%;
            animation-delay: 1s;
        }
        
        @keyframes tooltipFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .tooltip-label {
            color: #fbbf24;
            margin-bottom: 5px;
        }
        
        .tooltip-value {
            color: #22c55e;
            font-size: 12px;
        }
        
        /* 像素风状态指示器 */
        .status-pixel-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: rgba(0,0,0,0.3);
            border: 2px solid;
            font-size: 10px;
            font-family: 'Press Start 2P', monospace;
            margin-right: 10px;
        }
        
        .status-pixel-indicator.online {
            border-color: #22c55e;
            color: #22c55e;
        }
        
        .status-pixel-indicator.busy {
            border-color: #fbbf24;
            color: #fbbf24;
        }
        
        /* 像素风按钮 */
        .pixel-button {
            background: #e94560;
            border: none;
            padding: 8px 15px;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 3px 3px 0 #000;
            transition: all 0.1s;
        }
        
        .pixel-button:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 #000;
        }
        
        .pixel-button:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }
        
        /* 滚动条 - 像素风 */
        ::-webkit-scrollbar {
            width: 10px;
        }
        
        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border: 2px solid #e94560;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #e94560;
            border: 2px solid #000;
        }
        
        /* 像素字体引入 */
        @font-face {
            font-family: 'Press Start 2P';
            src: local('Courier New');
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- 顶部栏 -->
        <div class="header">
            <h1>⛪ 魔法教堂监控中心</h1>
            <div class="header-stats">
                <div class="header-stat">
                    <div class="header-stat-value" id="header-running">0</div>
                    <div class="header-stat-label">运行中</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="header-pending">0</div>
                    <div class="header-stat-label">等待中</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="header-completed">0</div>
                    <div class="header-stat-label">已完成</div>
                </div>
                <div class="header-stat">
                    <div class="header-stat-value" id="header-usage">0%</div>
                    <div class="header-stat-label">资源使用</div>
                </div>
            </div>
        </div>
        
        <!-- 左侧面板 -->
        <div class="left-panel">
            <!-- 任务列表 -->
            <div class="card" style="flex: 1;">
                <div class="card-title">📋 活跃任务</div>
                <div class="task-list" id="task-list">
                    <!-- 动态生成 -->
                </div>
            </div>
            
            <!-- 底部状态 -->
            <div class="card">
                <div class="card-title">🔔 系统状态</div>
                <div>
                    <span class="status-pixel-indicator online">● 在线</span>
                    <span style="color: #a2a8d3; font-size: 10px;">
                        更新：<span id="last-update">--:--:--</span>
                    </span>
                </div>
            </div>
        </div>
        
        <!-- 中央场景 - 魔法教堂 -->
        <div class="center-scene">
            <div class="pixel-scene">
                <!-- 教堂墙壁 -->
                <div class="church-wall"></div>
                
                <!-- 彩色玻璃窗 -->
                <div class="stained-glass"></div>
                
                <!-- 地板 -->
                <div class="church-floor"></div>
                
                <!-- 祭坛 -->
                <div class="altar"></div>
                
                <!-- 蜡烛 -->
                <div class="candle candle-left">
                    <div class="candle-flame"></div>
                </div>
                <div class="candle candle-right">
                    <div class="candle-flame"></div>
                </div>
                
                <!-- 女魔法师 -->
                <div class="pixel-mage">‍🦰</div>
                
                <!-- 魔法书 -->
                <div class="magic-book">📖</div>
                
                <!-- 魔法粒子 -->
                <div class="pixel-particle" style="left: 30%; top: 40%;"></div>
                <div class="pixel-particle" style="left: 70%; top: 35%; animation-delay: 0.5s;"></div>
                <div class="pixel-particle" style="left: 50%; top: 30%; animation-delay: 1s;"></div>
                <div class="pixel-particle" style="left: 40%; top: 50%; animation-delay: 1.5s;"></div>
                <div class="pixel-particle" style="left: 60%; top: 45%; animation-delay: 2s;"></div>
                
                <!-- 悬浮数据框 -->
                <div class="pixel-tooltip tooltip-1">
                    <div class="tooltip-label">⚡ 魔力值</div>
                    <div class="tooltip-value" id="tooltip-mana">98%</div>
                </div>
                
                <div class="pixel-tooltip tooltip-2">
                    <div class="tooltip-label">🎯 进度</div>
                    <div class="tooltip-value" id="tooltip-progress">65%</div>
                </div>
                
                <div class="pixel-tooltip tooltip-3">
                    <div class="tooltip-label">⏱️ 耗时</div>
                    <div class="tooltip-value" id="tooltip-time">2m34s</div>
                </div>
            </div>
        </div>
        
        <!-- 右侧面板 -->
        <div class="right-panel">
            <!-- 圆形仪表 -->
            <div class="card">
                <div class="card-title">📈 系统监控</div>
                <div style="display: flex; justify-content: space-around;">
                    <div>
                        <div class="gauge-pixel">
                            <div class="gauge-pixel-inner">
                                <div class="gauge-number" id="gauge-health">80</div>
                                <div class="gauge-label">健康</div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <div class="gauge-pixel">
                            <div class="gauge-pixel-inner">
                                <div class="gauge-number" id="gauge-usage">40</div>
                                <div class="gauge-label">使用</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 模型用量 -->
            <div class="card">
                <div class="card-title">🤖 模型用量</div>
                <div class="progress-pixel">
                    <div class="progress-pixel-header">
                        <span>qwen3.5-plus</span>
                        <span>1.0M</span>
                    </div>
                    <div class="progress-pixel-bar">
                        <div class="progress-pixel-fill" style="width: 80%"></div>
                    </div>
                </div>
                <div class="progress-pixel">
                    <div class="progress-pixel-header">
                        <span>gpt-4</span>
                        <span>0.5M</span>
                    </div>
                    <div class="progress-pixel-bar">
                        <div class="progress-pixel-fill beta" style="width: 40%"></div>
                    </div>
                </div>
                <div class="progress-pixel">
                    <div class="progress-pixel-header">
                        <span>claude-3</span>
                        <span>0.3M</span>
                    </div>
                    <div class="progress-pixel-bar">
                        <div class="progress-pixel-fill gamma" style="width: 25%"></div>
                    </div>
                </div>
            </div>
            
            <!-- 告警 -->
            <div class="card" style="flex: 1;">
                <div class="card-title">⚠️ 告警</div>
                <div id="alert-list">
                    <div class="alert-pixel">
                        <div class="alert-title">连接超时</div>
                        <div class="alert-desc">子 Agent #3 响应超时，已重试...</div>
                    </div>
                    <div class="alert-pixel">
                        <div class="alert-title">资源紧张</div>
                        <div class="alert-desc">子灵使用率超 80%</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部面板 -->
        <div class="bottom-panel">
            <div class="card">
                <div class="card-title">📊 实时指标</div>
                <div style="display: flex; gap: 20px; justify-content: space-around;">
                    <div style="text-align: center;">
                        <div style="font-size: 24px; color: #fbbf24; font-family: 'Press Start 2P';" id="metric-tasks">0</div>
                        <div style="font-size: 9px; color: #a2a8d3; margin-top: 5px;">总任务</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 24px; color: #e94560; font-family: 'Press Start 2P';" id="metric-subagents">0</div>
                        <div style="font-size: 9px; color: #a2a8d3; margin-top: 5px;">子灵</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 24px; color: #22c55e; font-family: 'Press Start 2P';" id="metric-success">100%</div>
                        <div style="font-size: 9px; color: #a2a8d3; margin-top: 5px;">成功率</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 模拟数据
        const mockData = {
            pending: { count: 2, tasks: [
                { id: 'task-001', name: '科幻小说创作', status: 'pending', progress: 0 },
                { id: 'task-002', name: '数据分析报告', status: 'pending', progress: 0 }
            ]},
            running: { count: 1, tasks: [
                { id: 'task-003', name: '悬疑小说大纲', status: 'running', active_subagents: 4, progress: 0.65, started_at: new Date(Date.now() - 154000).toISOString() }
            ], active_subagents: 4 },
            completed: { count: 12, today: 5 },
            resources: { available_task_slots: 2, available_subagents: 8, total_subagents: 12, usage_rate: 0.33 }
        };
        
        function updateDashboard() {
            const data = mockData;
            
            // 更新顶部统计
            document.getElementById('header-running').textContent = data.running.count;
            document.getElementById('header-pending').textContent = data.pending.count;
            document.getElementById('header-completed').textContent = data.completed.today;
            document.getElementById('header-usage').textContent = Math.round(data.resources.usage_rate * 100) + '%';
            
            // 更新任务列表
            const taskList = document.getElementById('task-list');
            taskList.innerHTML = [...data.pending.tasks, ...data.running.tasks].map(task => `
                <div class="task-item">
                    <div class="task-header">
                        <div class="task-name">${task.name}</div>
                        <div class="task-status">
                            <div class="status-pixel ${task.status}"></div>
                        </div>
                    </div>
                    <div class="task-progress-bar">
                        <div class="task-progress-fill" style="width: ${(task.progress * 100).toFixed(0)}%"></div>
                    </div>
                </div>
            `).join('');
            
            // 更新指标
            document.getElementById('metric-tasks').textContent = data.pending.count + data.running.count + data.completed.count;
            document.getElementById('metric-subagents').textContent = data.running.active_subagents;
            
            // 更新仪表
            const health = Math.round(80 + Math.random() * 20);
            const usage = Math.round(data.resources.usage_rate * 100);
            document.getElementById('gauge-health').textContent = health;
            document.getElementById('gauge-usage').textContent = usage;
            
            // 更新悬浮数据
            document.getElementById('tooltip-mana').textContent = (95 + Math.random() * 5).toFixed(0) + '%';
            document.getElementById('tooltip-progress').textContent = (data.running.tasks[0]?.progress * 100 || 0).toFixed(0) + '%';
            
            const elapsed = Math.floor((Date.now() - new Date(data.running.tasks[0]?.started_at || Date.now()).getTime()) / 1000);
            const min = Math.floor(elapsed / 60);
            const sec = elapsed % 60;
            document.getElementById('tooltip-time').textContent = `${min}m${sec}s`;
            
            // 更新时间
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            
            // 随机告警
            if (Math.random() > 0.7) {
                const alerts = document.getElementById('alert-list');
                const messages = [
                    { title: '连接超时', desc: '子 Agent #3 响应超时，已重试...' },
                    { title: '资源紧张', desc: '子灵使用率超 80%' },
                    { title: 'Token 异常', desc: '当前消耗 1.2M/小时' }
                ];
                const msg = messages[Math.floor(Math.random() * messages.length)];
                alerts.innerHTML = `<div class="alert-pixel"><div class="alert-title">${msg.title}</div><div class="alert-desc">${msg.desc}</div></div>` + alerts.innerHTML;
                if (alerts.children.length > 3) alerts.lastChild.remove();
            }
        }
        
        updateDashboard();
        setInterval(updateDashboard, 3000);
    </script>
</body>
</html>
